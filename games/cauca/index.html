<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎣 Fishing World: Chat & Chill</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg-deep:#04263f;
    --bg-mid:#0a4a72;
    --bg-light:#1980b8;
    --gold:#ffd35c;
    --gold-dark:#e0a900;
    --panel:#0e2f4a;
    --panel-light:#123a5c;
    --text:#eaf6ff;
    --text-dim:#9fc4de;
    --common:#b9c7d3;
    --uncommon:#3ddc84;
    --rare:#4fb3ff;
    --epic:#c163ff;
    --mythic:#ff7a45;
    --nav-h:58px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:linear-gradient(180deg,#0d3a5c 0%, var(--bg-deep) 60%, #021625 100%);
    color:var(--text);
    overflow:hidden;
    touch-action:manipulation;
  }
  #app{position:relative; width:100%; height:100%; max-width:520px; margin:0 auto; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 0 40px rgba(0,0,0,.5);}

  /* DESKTOP: kéo rộng vừa màn hình máy tính thay vì thu nhỏ dạng khung điện thoại */
  @media (min-width:701px){
    #app{
      max-width:1100px;
      border-radius:0;
      box-shadow:none;
    }
  }

  /* HEADER */
  #header{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 10px; background:rgba(2,20,34,.85); backdrop-filter:blur(4px);
    border-bottom:1px solid rgba(255,255,255,.08); z-index:20; flex-shrink:0;
  }
  #header .stat{display:flex; align-items:center; gap:4px; font-weight:700; font-size:14px; background:rgba(255,255,255,.06); padding:5px 9px; border-radius:20px;}
  #soundToggleBtn{border:none; font-size:15px; padding:5px 9px; line-height:1;}
  #header .stat .ic{font-size:15px;}
  #playerName{font-size:12px; color:var(--text-dim); font-weight:600;}

  /* ACCOUNT BUTTON */
  #accountBtn{
    display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:5px 10px 5px 5px;
    color:var(--text); font-size:11.5px; font-weight:700;
  }
  #accountBtn .avatarIc{
    width:24px; height:24px; border-radius:50%; background:var(--gold); color:#3a2400;
    display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0;
    overflow:hidden;
  }
  #accountBtn.loggedIn .avatarIc{background:var(--uncommon); color:#04351f;}

  /* BACK BUTTON */
  .back-btn{
    border:none; background:rgba(255,255,255,.08); color:var(--text);
    font-size:17px; cursor:pointer; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .back-btn:active{transform:scale(0.9);}

  #accountPanelBody{padding-top:6px;}
  .accInfoRow{display:flex; justify-content:space-between; padding:12px 4px; border-bottom:1px solid rgba(255,255,255,.06); font-size:13.5px;}
  .accInfoRow span:first-child{color:var(--text-dim);}

  /* AVATAR PICKER */
  #accAvatarBig{
    width:72px; height:72px; border-radius:50%; background:var(--gold); color:#3a2400; font-size:32px;
    display:flex; align-items:center; justify-content:center; margin:0 auto 8px; position:relative;
    border:none; overflow:hidden; padding:0; box-sizing:border-box; -webkit-appearance:none; appearance:none;
  }
  #accAvatarBig img{display:block;}
  .nameRow{display:flex; align-items:center; justify-content:center; gap:6px;}
  .nameEditBtn{
    background:rgba(255,255,255,.08); border:none; color:var(--text-dim); font-size:12px;
    width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .nameEditRow{display:flex; align-items:center; justify-content:center; gap:6px; margin-top:4px;}
  .nameEditRow input{
    background:var(--bg-deep); border:1px solid rgba(255,255,255,.15); border-radius:8px; color:var(--text);
    padding:7px 10px; font-size:13.5px; width:150px; text-align:center;
  }
  .nameEditRow button{
    border:none; border-radius:8px; padding:7px 10px; font-weight:700; font-size:12.5px;
  }
  .nameEditRow .nameSaveBtn{background:var(--gold); color:#3a2400;}
  .nameEditRow .nameCancelBtn{background:rgba(255,255,255,.08); color:var(--text);}
  #accAvatarBig .editBadge{
    position:absolute; bottom:-2px; right:-2px; width:24px; height:24px; border-radius:50%;
    background:var(--panel); border:2px solid var(--bg-deep); font-size:12px;
    display:flex; align-items:center; justify-content:center;
  }
  .uploadAvatarBtn{
    display:block; background:linear-gradient(180deg,#ffe08a,var(--gold-dark)); color:#3a2400; border:none;
    border-radius:12px; padding:12px; font-weight:800; font-size:13px; box-shadow:0 4px 0 #9e6f00;
  }

  /* MAIN GAME AREA */
  #gameArea{
    position:relative; flex:1; overflow:hidden;
    background:linear-gradient(180deg,#1c6ea3 0%, #0f4f7f 40%, #072f4d 100%);
  }
  .bubble{position:absolute; bottom:-20px; border-radius:50%; background:rgba(255,255,255,.15); animation:rise linear infinite;}
  @keyframes rise{ to{ transform:translateY(-120vh); opacity:0;} }

  #waterLine{position:absolute; top:0; left:0; right:0; height:6px; background:linear-gradient(90deg,#2fa9e0,#1980b8,#2fa9e0); opacity:.6;}

  #rodArea{
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    text-align:center; z-index:5;
  }
  #rodIcon{font-size:34px; filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));}
  #line{
    position:absolute; left:50%; top:50px; width:2px; background:rgba(255,255,255,.5);
    transform:translateX(-50%); transition:height .3s;
  }
  #hook{
    position:absolute; left:50%; transform:translateX(-50%); font-size:20px;
    transition:top .4s ease-in-out;
  }

  #catchZone{
    position:absolute; left:50%; top:55%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:14px; z-index:10;
  }
  #fishSilhouette{font-size:60px; animation:wiggle .4s infinite alternate;}
  @keyframes wiggle{ from{transform:rotate(-8deg);} to{transform:rotate(8deg);} }

  #statusText{
    text-align:center; font-size:15px; font-weight:700; color:var(--gold);
    text-shadow:0 2px 6px rgba(0,0,0,.5); margin-top:6px; min-height:20px;
  }

  #castBtn{
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,#ffe08a,var(--gold-dark));
    color:#3a2400; border:none; border-radius:40px; padding:16px 40px;
    font-size:17px; font-weight:800; box-shadow:0 6px 0 #9e6f00, 0 10px 18px rgba(0,0,0,.4);
    cursor:pointer; z-index:15; letter-spacing:.5px;
    transition:transform .1s;
  }
  #castBtn:active{transform:translateX(-50%) translateY(4px); box-shadow:0 2px 0 #9e6f00, 0 4px 10px rgba(0,0,0,.4);}
  #castBtn.pulled{animation:pulse .5s infinite;}
  @keyframes pulse{ 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.08);} }
  #castBtn:disabled{opacity:.5; cursor:default;}

  #comboBar{
    position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
    width:84%; max-width:320px; height:14px; background:rgba(0,0,0,.35);
    border-radius:10px; overflow:hidden; display:none; border:1px solid rgba(255,255,255,.2);
  }
  #comboFill{height:100%; width:0%; background:linear-gradient(90deg,var(--gold),#fff3c0); transition:width .05s linear;}

  /* RHYTHM TIMING BAR */
  #rhythmWrap{
    position:absolute; bottom:130px; left:50%; transform:translateX(-50%);
    width:84%; max-width:320px; display:none; z-index:16;
  }
  #rhythmTrack{
    position:relative; width:100%; height:22px; background:rgba(0,0,0,.4);
    border-radius:12px; border:1px solid rgba(255,255,255,.25); overflow:hidden;
  }
  #rhythmZone{
    position:absolute; top:0; bottom:0; background:rgba(61,220,132,.45);
    border-left:2px solid var(--uncommon); border-right:2px solid var(--uncommon);
  }
  #rhythmCursor{
    position:absolute; top:-4px; bottom:-4px; width:5px; background:#fff;
    border-radius:3px; box-shadow:0 0 8px rgba(255,255,255,.8);
    left:0%;
  }
  #rhythmHint{
    text-align:center; font-size:11.5px; color:var(--text-dim); margin-top:5px; font-weight:700;
  }
  .missFlash{animation:missFlash .3s;}
  @keyframes missFlash{ 0%,100%{filter:none;} 50%{filter:brightness(2) hue-rotate(-40deg);} }

  /* FLOATING CATCH TOAST */
  .catchPopup{
    position:absolute; left:50%; top:40%; transform:translate(-50%,-50%) scale(.5);
    background:var(--panel); border:2px solid var(--gold); border-radius:18px;
    padding:20px 26px; text-align:center; z-index:100; opacity:0;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    animation:popIn .4s forwards;
  }
  @keyframes popIn{ to{ transform:translate(-50%,-50%) scale(1); opacity:1;} }
  .catchPopup .cfish{font-size:54px;}
  .catchPopup .cname{font-size:19px; font-weight:800; margin-top:4px;}
  .catchPopup .crarity{font-size:12px; font-weight:700; margin-top:2px; padding:3px 10px; border-radius:12px; display:inline-block;}
  .catchPopup .cweight{font-size:13px; color:var(--text-dim); margin-top:6px;}
  .catchPopup .ccoin{font-size:15px; color:var(--gold); font-weight:700; margin-top:4px;}
  .catchPopup .cclose{margin-top:14px; background:var(--gold); border:none; padding:9px 24px; border-radius:20px; font-weight:700; color:#3a2400;}

  /* BOTTOM NAV */
  #nav{
    display:flex; background:rgba(2,20,34,.92); border-top:1px solid rgba(255,255,255,.08);
    flex-shrink:0; position:relative; z-index:40; height:var(--nav-h);
  }
  .navBtn{
    flex:1; text-align:center; padding:9px 2px 8px; background:none; border:none; color:var(--text-dim);
    font-size:11px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .navBtn .navIc{font-size:20px;}
  .navBtn.active{color:var(--gold);}

  /* PANELS (overlay screens) */
  .panel{
    position:absolute; top:0; left:0; right:0; bottom:var(--nav-h); background:var(--bg-deep); z-index:30;
    display:none; flex-direction:column; overflow:hidden;
  }
  .panel.show{display:flex;}
  .panelHeader{
    padding:14px 16px 10px; font-size:18px; font-weight:800; border-bottom:1px solid rgba(255,255,255,.08);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:10px;
  }
  .panelHeader .phTitle{flex:1; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .closeBtn{
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:var(--text);
    width:34px; height:34px; border-radius:50%; font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; line-height:1;
  }
  .closeBtn:active{background:rgba(255,255,255,.18);}
  .panelBody{flex:1; overflow-y:auto; padding:10px 12px 16px;}

  /* SHOP */
  .rodCard{
    background:var(--panel); border-radius:14px; padding:14px; margin-bottom:10px;
    border:2px solid rgba(255,255,255,.06); display:flex; gap:12px; align-items:center;
  }
  .rodCard.owned{border-color:var(--uncommon);}
  .rodCard.equipped{border-color:var(--gold); background:var(--panel-light);}
  .rodIcon{font-size:34px; width:44px; text-align:center;}
  .rodInfo{flex:1;}
  .rodInfo .rname{font-weight:800; font-size:14.5px;}
  .rodInfo .rdesc{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .rodBtn{
    background:var(--gold); color:#3a2400; border:none; border-radius:10px; padding:9px 12px;
    font-weight:800; font-size:12.5px; white-space:nowrap;
  }
  .rodBtn.disabled{background:#3a4a5a; color:#7f95a8;}
  .rodBtn.equippedBtn{background:var(--uncommon); color:#04351f;}

  /* COLLECTION */
  .collectionHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:0 2px;}
  .collectionHead .cprog{font-size:13px; font-weight:700; color:var(--gold);}
  .fishGrid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .fishCell{
    background:var(--panel); border-radius:12px; padding:8px 4px; text-align:center;
    border:2px solid rgba(255,255,255,.05); position:relative;
  }
  .fishCell.locked{opacity:.35;}
  .fishCell .fic{font-size:26px;}
  .fishCell .fnm{font-size:9.5px; font-weight:700; margin-top:2px; line-height:1.2; min-height:22px;}
  .fishCell .fcount{position:absolute; top:2px; right:4px; font-size:9px; color:var(--gold); font-weight:800;}

  /* INVENTORY (sell) */
  .invItem{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--panel); border-radius:12px;
    padding:10px 12px; margin-bottom:8px;
  }
  .invItem .fic{font-size:28px; width:36px; text-align:center; flex-shrink:0;}
  .invItem .iinfo{flex:1; min-width:0;}
  .invItem .iname{font-weight:700; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .invItem .iprice{font-size:11.5px; color:var(--gold); margin-top:1px;}
  .invItem .iqty{margin-left:auto; font-weight:800; color:var(--text-dim); font-size:13px; flex-shrink:0;}
  .invItem .sellOneBtn{
    background:var(--gold); color:#3a2400; border:none; padding:8px 12px; border-radius:10px;
    font-weight:800; font-size:11.5px; white-space:nowrap; margin-left:8px; flex-shrink:0;
  }
  .sellAllBtn{
    position:sticky; bottom:0; width:100%; background:linear-gradient(180deg,#ffe08a,var(--gold-dark));
    color:#3a2400; border:none; padding:14px; border-radius:14px; font-weight:800; font-size:15px;
    margin-top:8px; box-shadow:0 6px 0 #9e6f00;
  }

  /* CHAT */
  #chatMessages{flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:8px;}
  .msg{display:flex; gap:8px; align-items:flex-start; max-width:85%;}
  .msg .av{font-size:20px; flex-shrink:0; width:26px; height:26px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center;}
  .msg .bubble2{background:var(--panel); border-radius:14px 14px 14px 4px; padding:8px 12px; font-size:13.5px; word-break:break-word; overflow-wrap:anywhere;}
  .msg .name{font-size:11px; color:var(--text-dim); font-weight:700; margin-bottom:2px;}
  .msg .msgTime{font-size:10px; color:var(--text-dim); opacity:.65; margin-top:2px;}
  .msg.me .msgTime{text-align:right;}
  .msg.me{align-self:flex-end; flex-direction:row-reverse;}
  .msg.me .bubble2{background:var(--gold); color:#3a2400; border-radius:14px 14px 4px 14px;}
  .msg.sys{align-self:center; max-width:95%;}
  .msg.sys .bubble2{background:linear-gradient(90deg,rgba(255,211,92,.15),rgba(255,122,69,.15)); border:1px solid var(--gold); color:var(--gold); font-weight:700; text-align:center; font-size:12.5px;}
  #chatInputBar{display:flex; gap:8px; padding:10px; border-top:1px solid rgba(255,255,255,.08); flex-shrink:0;}
  #chatInputBar input{
    flex:1; background:var(--panel); border:1px solid rgba(255,255,255,.1); border-radius:20px;
    padding:11px 16px; color:var(--text); font-size:14px; outline:none;
  }
  #chatInputBar button{
    background:var(--gold); color:#3a2400; border:none; border-radius:50%; width:42px; height:42px;
    font-size:18px; flex-shrink:0;
  }

  .rarityTag{font-weight:800;}
  .r-common{color:var(--common);}
  .r-uncommon{color:var(--uncommon);}
  .r-rare{color:var(--rare);}
  .r-epic{color:var(--epic);}
  .r-mythic{color:var(--mythic);}
  .bg-common{background:rgba(185,199,211,.2); color:var(--common);}
  .bg-uncommon{background:rgba(61,220,132,.2); color:var(--uncommon);}
  .bg-rare{background:rgba(79,179,255,.2); color:var(--rare);}
  .bg-epic{background:rgba(193,99,255,.2); color:var(--epic);}
  .bg-mythic{background:rgba(255,122,69,.2); color:var(--mythic);}

  #toastWrap{position:absolute; top:56px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:6px; align-items:center; pointer-events:none;}
  .toast{background:rgba(0,0,0,.75); color:#fff; padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600; animation:toastIn .3s;}
  @keyframes toastIn{ from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15); border-radius:10px;}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div style="flex:1;"></div>
    <div style="display:flex; gap:6px;">
      <div class="stat"><span class="ic">💰</span><span id="coinDisplay">0</span></div>
      <div class="stat"><span class="ic">🐟</span><span id="fishCountDisplay">0/60</span></div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="gameArea">
    <div id="waterLine"></div>
    <div id="rodArea">
      <div id="rodIcon">🎣</div>
    </div>
    <div id="line"></div>
    <div id="hook">🪝</div>

    <div id="catchZone">
      <div id="fishSilhouette" style="display:none;">🐟</div>
      <div id="statusText">Nhấn "Thả câu" để bắt đầu!</div>
    </div>

    <div id="comboBar"><div id="comboFill"></div></div>
    <div id="rhythmWrap">
      <div id="rhythmTrack">
        <div id="rhythmZone"></div>
        <div id="rhythmCursor"></div>
      </div>
      <div id="rhythmHint">Nhấn đúng lúc con trỏ vào vùng xanh!</div>
    </div>
    <div id="toastWrap"></div>

    <button id="castBtn">🎣 THẢ CÂU</button>
  </div>

  <!-- NAV -->
  <div id="nav">
    <button class="navBtn active" data-panel="game"><span class="navIc">🎣</span>Câu cá</button>
    <button class="navBtn" data-panel="shop"><span class="navIc">🛒</span>Cửa hàng</button>
    <button class="navBtn" data-panel="collection"><span class="navIc">📖</span>Sổ tay</button>
    <button class="navBtn" data-panel="inventory"><span class="navIc">🎒</span>Kho đồ</button>
  </div>

  <!-- SHOP PANEL -->
  <div class="panel" id="panel-shop">
    <div class="panelHeader">
      <span class="phTitle">🛒 Cửa Hàng Cần Câu <span id="shopCoin" style="font-size:13px; color:var(--gold);"></span></span>
      <button class="closeBtn" data-close>✕</button>
    </div>
    <div class="panelBody" id="shopList"></div>
  </div>

  <!-- COLLECTION PANEL -->
  <div class="panel" id="panel-collection">
    <div class="panelHeader">
      <span class="phTitle">📖 Sổ Tay Sinh Vật Biển</span>
      <button class="closeBtn" data-close>✕</button>
    </div>
    <div class="panelBody">
      <div class="collectionHead">
        <span style="font-size:12.5px; color:var(--text-dim);">Bộ sưu tập của bạn</span>
        <span class="cprog" id="collectionProg">0/60</span>
      </div>
      <div class="fishGrid" id="fishGrid"></div>
    </div>
  </div>

  <!-- INVENTORY PANEL -->
  <div class="panel" id="panel-inventory">
    <div class="panelHeader">
      <span class="phTitle">🎒 Kho Đồ (Bán Cá)</span>
      <button class="closeBtn" data-close>✕</button>
    </div>
    <div class="panelBody" id="invList" style="display:flex; flex-direction:column;"></div>
  </div>

</div>

  uncommon: {label:"Hiếm",       color:"uncommon", weight:30, priceRange:[100,300],     icons:["🐡","🐟"]},

const commonNames = ["Cá chép","Cá rô phi","Cá diếc","Cá quả","Cá trắm","Cá mè","Cá rô đồng","Cá lóc","Cá sặc","Cá bống","Cá linh","Cá thiểu","Cá lăng","Cá he","Cá đối","Cá nục","Cá cơm","Cá liệt","Cá tra","Cá basa"];
const uncommonNames = ["Cá chẽm","Cá hồi","Cá trích","Cá trê hoàng đế","Cá măng","Cá vược","Cá đù","Cá thu","Cá nhồng","Cá hố","Cá bớp","Cá mú","Cá dứa","Cá ngát","Cá kèo"];
const rareNames = ["Cá ngừ đại dương","Cá đuối lửa","Cá mặt trăng","Cá kiếm","Cá cờ","Cá heo xanh","Cá mập vây đen","Cá nhám búa nhỏ","Cá chim biển","Cá hô sông","Cá tầm","Cá đao"];
const epicNames = ["Cá mập trắng","Cá táng","Cá rồng ruy băng","Cá voi lùn","Cá nhám voi con","Cá kiếm khổng lồ","Cá mập hổ","Cá đuối manta","Cá chình khổng lồ","Cá rùa biển cổ"];
const mythicNames = ["Kraken Con","Cá chép vàng cổ đại","Cá rồng tiên"];

function buildFishList(){
  const list = [];
  let id=1;
  function push(names, rarityKey){
    const r = RARITIES[rarityKey];
    names.forEach((n,i)=>{
      list.push({
        id:id++,
        name:n,
        rarity:rarityKey,
        icon:r.icons[i % r.icons.length],
        price: Math.round((r.priceRange[0] + Math.random()*(r.priceRange[1]-r.priceRange[0]))/1)
      });
    });
  }
  push(commonNames,"common");
  push(uncommonNames,"uncommon");
  push(rareNames,"rare");
  push(epicNames,"epic");
  push(mythicNames,"mythic");
  return list;
}
let FISH_LIST = buildFishList(); // fallback ban đầu, sẽ được thay bằng dữ liệu Firebase (đồng bộ cho mọi người chơi)
let fishDataLoaded = false;

function fishDataToFirebaseObj(list){
  const obj = {};
  list.forEach(f=>{ obj[f.id] = {name:f.name, rarity:f.rarity, icon:f.icon, price:f.price}; });
  return obj;
}

function attachFishDataSync(){
  db.ref('fishData').on('value', (snap)=>{
    const val = snap.val();
    if(!val){
      // Chưa có dữ liệu trên Firebase (lần đầu) -> khởi tạo từ danh sách mặc định
      if(!fishDataLoaded){
        db.ref('fishData').set(fishDataToFirebaseObj(FISH_LIST)).catch(()=>{});
      }
      return;
    }
    const list = Object.keys(val).map(id=>{
      const f = val[id];
      return {id: isNaN(id)?id:Number(id), name:f.name, rarity:f.rarity, icon:f.icon, price:Number(f.price)||0};
    });
    if(list.length){
      FISH_LIST = list;
      fishDataLoaded = true;
      // Cập nhật lại giao diện nếu đang mở, để thấy thay đổi ngay khi admin sửa
      try{ if(typeof renderShop==='function') renderShop(); }catch(e){}
      try{ if(typeof renderInventory==='function') renderInventory(); }catch(e){}
    }
  });
}
attachFishDataSync();

/* ============== FISHING LOGIC ============== */
let fishingState = "idle"; // idle -> waiting -> biting -> reeling
let waitTimer=null, biteTimeout=null;
const rodBonus = ()=> RODS.find(r=>r.id===state.equippedRod).bonus;

function getRodSpeedMultiplier(){
  const b = rodBonus();
  return 1 - (b.speed||0);
}

function rollFish(){
  const b = rodBonus();
  // base weights
  let weights = {common:50, uncommon:30, rare:14, epic:5, mythic:1};
  if(b.uncommon) weights.uncommon += b.uncommon;
  if(b.rareUp){ weights.rare += b.rareUp; weights.epic += b.rareUp*0.5; }
  if(b.epic){ weights.epic += b.epic; }
  if(b.mythicEpic){ weights.mythic += b.mythicEpic*0.4; weights.epic += b.mythicEpic; }
  // normalize pick
  const total = Object.values(weights).reduce((a,c)=>a+c,0);
  let r = Math.random()*total;
  let rarity = 'common';
  for(const key of ['common','uncommon','rare','epic','mythic']){
    if(r < weights[key]){ rarity=key; break; }
    r -= weights[key];
  }
  const pool = FISH_LIST.filter(f=>f.rarity===rarity);
  const fish = pool[Math.floor(Math.random()*pool.length)];
  return fish;
}

function resetVisual(){
  fishSilhouette.style.display='none';
  hook.style.top='60px';
  line.style.height='10px';
  comboBar.style.display='none';
  comboFill.style.width='0%';
  rhythmWrap.style.display='none';
  castBtn.classList.remove('pulled');
  stopRhythmLoop();
}

castBtn.addEventListener('click', ()=>{
  SoundEngine.unlock();
  if(fishingState==='idle'){
    startCast();
  } else if(fishingState==='biting'){
    tryReelHit();
  }
});

function startCast(){
  SoundEngine.sfx.cast();
  fishingState='waiting';
  castBtn.disabled=true;
  statusText.textContent='Đang thả câu... chờ cá cắn câu 🌊';
  hook.style.top='140px';
  line.style.height='140px';

  const baseWait = 1800 + Math.random()*2600;
  const wait = baseWait * getRodSpeedMultiplier();
  waitTimer = setTimeout(()=>{
    biteFish();
  }, wait);
  castBtn.disabled=false;
  castBtn.textContent='⏳ Đang chờ...';
}

let pendingFish = null;
let requiredHits = 3;
let currentHits = 0;

function biteFish(){
  SoundEngine.sfx.bite();
  pendingFish = rollFish();
  fishingState='biting';
  fishSilhouette.textContent = pendingFish.icon;
  fishSilhouette.style.display='block';
  hook.style.top='170px';
  castBtn.textContent='💥 THU CẦN!';
  castBtn.classList.add('pulled');
  comboBar.style.display='block';
  comboFill.style.width='0%';

  // Higher rarity fish require more successful hits & move faster
  const hitsByRarity = {common:2, uncommon:3, rare:4, epic:5, mythic:6};
  requiredHits = hitsByRarity[pendingFish.rarity] || 3;
  currentHits = 0;
  missCount = 0;

  statusText.textContent = `🎣 ${pendingFish.icon} ${pendingFish.name} đã cắn câu! (0/${requiredHits})`;

  startRhythmLoop();

  // if not reeled within time, fish escapes (unless noMiss rod)
  const b = rodBonus();
  const escapeTime = 9000;
  biteTimeout = setTimeout(()=>{
    if(fishingState==='biting' && !b.noMiss){
      fishEscape();
    } else if(fishingState==='biting' && b.noMiss){
      landFish();
    }
  }, escapeTime);
}

/* ---- Rhythm timing mechanic ---- */
let rhythmAnim = null;
let rhythmPos = 0;
let rhythmDir = 1;
let rhythmSpeed = 1.6;   // % per frame tick
let zoneStart = 40, zoneWidth = 20; // percentages

function randomizeZone(){
  const b = rodBonus();
  // easier rods (rareUp/epic/mythicEpic bonuses) get slightly wider zone
  let width = 18;
  if(b.rareUp) width += 2;
  if(b.epic) width += 3;
  if(b.mythicEpic) width += 4;
  zoneWidth = Math.min(width, 34);
  zoneStart = Math.random()*(100-zoneWidth);
  rhythmZone.style.left = zoneStart+'%';
  rhythmZone.style.width = zoneWidth+'%';
}

function startRhythmLoop(){
  randomizeZone();
  rhythmPos = 0;
  rhythmDir = 1;
  rhythmWrap.style.display='block';
  // speed scales with rarity (harder fish move faster) and rod speed bonus
  const rarityMult = {common:1, uncommon:1.15, rare:1.35, epic:1.55, mythic:1.8}[pendingFish.rarity] || 1;
  rhythmSpeed = (1.4 + Math.random()*0.4) * rarityMult;

  function tick(){
    rhythmPos += rhythmSpeed * rhythmDir;
    if(rhythmPos >= 100){ rhythmPos = 100; rhythmDir = -1; }
    if(rhythmPos <= 0){ rhythmPos = 0; rhythmDir = 1; }
    rhythmCursor.style.left = rhythmPos+'%';
    rhythmAnim = requestAnimationFrame(tick);
  }
  rhythmAnim = requestAnimationFrame(tick);
}

function stopRhythmLoop(){
  if(rhythmAnim){ cancelAnimationFrame(rhythmAnim); rhythmAnim=null; }
}

function tryReelHit(){
  if(fishingState !== 'biting') return;
  const b = rodBonus();
  const inZone = b.noMiss ? true : (rhythmPos >= zoneStart && rhythmPos <= zoneStart+zoneWidth);

  if(inZone){
    SoundEngine.sfx.hit();
    currentHits++;
    comboFill.style.width = Math.round((currentHits/requiredHits)*100)+'%';
    statusText.textContent = `✅ Đúng nhịp! (${currentHits}/${requiredHits})`;
    if(currentHits >= requiredHits){
      landFish();
      return;
    }
    randomizeZone(); // new zone position for next hit, keeps challenge going
  } else {
    // Miss! penalize progress and flash red, risk losing the fish
    SoundEngine.sfx.miss();
    gameArea.classList.add('missFlash');
    setTimeout(()=>gameArea.classList.remove('missFlash'), 300);
    currentHits = Math.max(0, currentHits - 1);
    comboFill.style.width = Math.round((currentHits/requiredHits)*100)+'%';
    statusText.textContent = `❌ Nhấn lệch nhịp! Cẩn thận, cá sắp sổng (${currentHits}/${requiredHits})`;
    missCount++;
    if(missCount >= maxMisses){
      fishEscape();
    }
  }
}
let missCount = 0;
const maxMisses = 3;

function fishEscape(){
  SoundEngine.sfx.escape();
  clearTimeout(biteTimeout);
  stopRhythmLoop();
  fishingState='idle';
  currentHits=0; missCount=0;
  statusText.textContent='😭 Cá đã sổng mất vì nhấn lệch nhịp! Thử lại nhé.';
  castBtn.textContent='🎣 THẢ CÂU';
  resetVisual();
}

function landFish(){
  clearTimeout(biteTimeout);
  stopRhythmLoop();
  fishingState='idle';
  currentHits=0; missCount=0;
  const fish = pendingFish;
  pendingFish=null;
  castBtn.textContent='🎣 THẢ CÂU';
  resetVisual();
  statusText.textContent='Nhấn "Thả câu" để tiếp tục!';

  // record
  const weight = generateWeight(fish.rarity);
  state.inventory[fish.id] = (state.inventory[fish.id]||0)+1;
  if(!state.caughtIds[fish.id]) state.caughtIds[fish.id] = {count:0, maxWeight:0};
  state.caughtIds[fish.id].count++;
  if(weight > state.caughtIds[fish.id].maxWeight) state.caughtIds[fish.id].maxWeight = weight;
  saveState();
  updateHeader();
  SoundEngine.sfx.catchFish(fish.rarity);
  showCatchPopup(fish, weight);
}

function generateWeight(rarity){
  const ranges = {common:[0.2,3], uncommon:[1,8], rare:[5,40], epic:[30,300], mythic:[80,900]};
  const [lo,hi] = ranges[rarity];
  return Math.round((lo + Math.random()*(hi-lo))*10)/10;
}

function showCatchPopup(fish, weight){
  const r = RARITIES[fish.rarity];
  const pop = document.createElement('div');
  pop.className='catchPopup';
  pop.innerHTML = `
    <div class="cfish">${fish.icon}</div>
    <div class="cname">${fish.name}</div>
    <div class="crarity bg-${r.color}">${r.label}</div>
    <div class="cweight">Cân nặng: ${weight}kg</div>
    <div class="ccoin">+ Đã thêm vào kho đồ 🎒</div>
    <button class="cclose">Tuyệt vời!</button>
  `;
  gameArea.appendChild(pop);
  pop.querySelector('.cclose').addEventListener('click', ()=> pop.remove());
  setTimeout(()=>{ if(pop.parentNode) pop.remove(); }, 4500);
}

/* ============== SHOP ============== */
function renderShop(){
  const list = document.getElementById('shopList');
  list.innerHTML = '';
  RODS.forEach(rod=>{
    const owned = state.ownedRods.includes(rod.id);
    const equipped = state.equippedRod===rod.id;
    const card = document.createElement('div');
    card.className = 'rodCard' + (owned?' owned':'') + (equipped?' equipped':'');
    let btnHtml;
    if(equipped){
      btnHtml = `<button class="rodBtn equippedBtn">Đang dùng</button>`;
    } else if(owned){
      btnHtml = `<button class="rodBtn" data-equip="${rod.id}">Trang bị</button>`;
    } else {
      const afford = state.coins >= rod.price;
      btnHtml = `<button class="rodBtn ${afford?'':'disabled'}" data-buy="${rod.id}">${rod.price.toLocaleString('vi-VN')} 💰</button>`;
    }
    card.innerHTML = `
      <div class="rodIcon">${rod.icon}</div>
      <div class="rodInfo">
        <div class="rname">${rod.name}</div>
        <div class="rdesc">${rod.desc}</div>
      </div>
      ${btnHtml}
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('[data-buy]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-buy');
      const rod = RODS.find(r=>r.id===id);
      if(state.coins >= rod.price){
        SoundEngine.sfx.buy();
        state.coins -= rod.price;
        state.ownedRods.push(id);
        state.equippedRod = id;
        saveState();
        updateHeader();
        renderShop();
        toast(`Đã mua và trang bị ${rod.name}!`);
        addSystemChatMsg(`🎉 Cần thủ #${state.playerId} vừa tậu ${rod.name}!`);
      } else {
        SoundEngine.sfx.error();
        toast('Không đủ xu 😢');
      }
    });
  });
  list.querySelectorAll('[data-equip]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-equip');
      SoundEngine.sfx.click();
      state.equippedRod = id;
      saveState();
      renderShop();
      toast('Đã trang bị cần câu!');
    });
  });
}

/* ============== INVENTORY / SELL ============== */
function renderInventory(){
  const wrap = document.getElementById('invList');
  wrap.innerHTML='';
  const ids = Object.keys(state.inventory).filter(id=>state.inventory[id]>0);
  if(ids.length===0){
    wrap.innerHTML = `<div style="text-align:center; color:var(--text-dim); padding:40px 10px; font-size:14px;">Kho đồ trống. Hãy đi câu cá nào! 🎣</div>`;
    return;
  }
  let totalValue = 0;
  ids.forEach(id=>{
    const fish = FISH_LIST.find(f=>f.id==id);
    const qty = state.inventory[id];
    const r = RARITIES[fish.rarity];
    totalValue += fish.price*qty;
    const item = document.createElement('div');
    item.className='invItem';
    item.innerHTML = `
      <div class="fic">${fish.icon}</div>
      <div class="iinfo">
        <div class="iname">${fish.name} <span class="r-${r.color}" style="font-size:10.5px;">(${r.label})</span></div>
        <div class="iprice">${fish.price.toLocaleString('vi-VN')} xu / con</div>
      </div>
      <div class="iqty">x${qty}</div>
      <button class="sellOneBtn" data-sell-id="${id}">Bán (${(fish.price*qty).toLocaleString('vi-VN')} 💰)</button>
    `;
    wrap.appendChild(item);
  });
  wrap.querySelectorAll('[data-sell-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-sell-id');
      const fish = FISH_LIST.find(f=>f.id==id);
      const qty = state.inventory[id]||0;
      if(qty<=0) return;
      SoundEngine.sfx.sell();
      const b = rodBonus();
      let value = fish.price*qty;
      if(b.sellBonus) value = Math.round(value*(1+b.sellBonus));
      state.coins += value;
      delete state.inventory[id];
      saveState();
      updateHeader();
      renderInventory();
      toast(`Đã bán ${fish.name}, nhận ${value.toLocaleString('vi-VN')} xu!`);
    });
  });
  const sellBtn = document.createElement('button');
  sellBtn.className='sellAllBtn';
  sellBtn.textContent = `💰 Bán tất cả (nhận ${totalValue.toLocaleString('vi-VN')} xu)`;
  sellBtn.addEventListener('click', ()=>{
    SoundEngine.sfx.sell();
    const b = rodBonus();
    let value = totalValue;
    if(b.sellBonus) value = Math.round(value*(1+b.sellBonus));
    state.coins += value;
    state.inventory = {};
    saveState();
    updateHeader();
    renderInventory();
    toast(`Đã bán cá, nhận ${value.toLocaleString('vi-VN')} xu!`);
  });
  wrap.appendChild(sellBtn);
}

function goToGameTab(){
  navBtns.forEach(b=>b.classList.remove('active'));
  document.querySelector('.navBtn[data-panel="game"]').classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
}
navBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    SoundEngine.unlock();
    SoundEngine.sfx.open();
    navBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.getAttribute('data-panel');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
    if(target!=='game'){
      document.getElementById('panel-'+target).classList.add('show');
      if(target==='shop') renderShop();
      if(target==='collection') renderCollection();
      if(target==='inventory') renderInventory();
    }
  });
});

/* ============== CLOSE BUTTONS ============== */
document.querySelectorAll('.closeBtn[data-close]').forEach(btn=>{
  btn.addEventListener('click', ()=>{ SoundEngine.sfx.close(); goToGameTab(); });
});

/* ============== INIT ============== */
updateHeader();
resetVisual();

})();

function goBack(){
  if(window.history.length > 1){
    window.history.back();
  } else {
    window.location.href = 'games';
  }
}
</script>
