<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trò chơi</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
        height: 100%; margin: 0; padding: 0; overflow: hidden;
        background: #060810;
        font-family: 'Nunito', -apple-system, system-ui, sans-serif;
        overscroll-behavior: none;
    }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    #screen {
        height: 100%; width: 100%;
        display: flex; flex-direction: column;
        background: linear-gradient(180deg, #1a0228 0%, #120018 60%, #0d001a 100%);
    }

    /* Header giống sidebar-header của trang chat */
    .header {
        padding: 14px 16px 10px;
        display: flex; align-items: center; gap: 12px;
        border-bottom: 1px solid rgba(180,50,180,0.2);
        flex-shrink: 0;
    }
    .back-btn {
        border: none; background: #1c2540; color: #dce8ff;
        font-size: 18px; font-family: inherit; cursor: pointer;
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .back-btn:active { transform: scale(0.9); }
    .header-title {
        font-size: 18px; font-weight: 800; color: #dce8ff; flex: 1;
        display: flex; align-items: center; gap: 8px;
    }
    .header-badge {
        font-size: 11px; font-weight: 800; color: #fff;
        background: linear-gradient(135deg, #ff8a3d, #ff5e3a);
        padding: 3px 10px; border-radius: 20px;
        box-shadow: 0 3px 10px rgba(255,94,58,0.4);
    }

    /* Search bar giống trang chat */
    .top-bar { padding: 10px 14px 8px; flex-shrink: 0; }
    .top-bar input {
        width: 100%; padding: 9px 14px;
        border: 1.5px solid rgba(180,50,180,0.3); border-radius: 22px;
        font-size: 14px; font-family: inherit; outline: none;
        background: rgba(60,10,80,0.5); color: #dce8ff;
    }
    .top-bar input::placeholder { color: #7a5a90; }

    /* Banner sắp ra mắt */
    .coming-banner {
        margin: 4px 14px 4px;
        padding: 14px 16px;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(255,138,61,0.18), rgba(255,94,58,0.10));
        border: 1px solid rgba(255,138,61,0.35);
        flex-shrink: 0;
        display: flex; align-items: center; gap: 12px;
    }
    .coming-banner .icon { font-size: 28px; flex-shrink: 0; }
    .coming-banner .text-title { font-size: 15px; font-weight: 800; color: #ffcda0; }
    .coming-banner .text-sub { font-size: 12.5px; color: #b79fce; margin-top: 2px; }

    #list { flex: 1; overflow-y: auto; padding-bottom: 20px; }

    .game-item {
        padding: 12px 14px;
        display: flex; align-items: center; gap: 12px;
        border-radius: 14px;
        margin: 6px 10px;
        background: rgba(50,10,70,0.5);
        border: 1px solid rgba(150,40,150,0.2);
        cursor: pointer;
        transition: background .15s, border-color .15s, opacity .15s;
        position: relative;
        opacity: 0.88;
    }
    .game-item:active { background: rgba(80,15,100,0.65); }

    .game-icon-wrap {
        width: 56px; height: 56px; border-radius: 16px;
        flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        font-size: 28px;
        position: relative;
    }
    .game-info { flex: 1; min-width: 0; }
    .game-name { font-size: 15px; font-weight: 700; color: #dce8ff; }
    .game-status {
        font-size: 12.5px; color: #ff9d5c; font-weight: 700;
        margin-top: 3px; display: flex; align-items: center; gap: 5px;
    }
    .game-status .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #ff8a3d; flex-shrink: 0;
    }

    .lock-tag {
        font-size: 10.5px; font-weight: 800; color: #ffcda0;
        background: rgba(255,138,61,0.15);
        border: 1px solid rgba(255,138,61,0.4);
        padding: 3px 9px; border-radius: 20px;
        flex-shrink: 0; white-space: nowrap;
    }

    /* Game đã mở khóa (có thể chơi ngay) */
    .game-item.unlocked {
        opacity: 1;
        background: linear-gradient(135deg, rgba(59,201,94,0.18), rgba(30,155,69,0.10));
        border: 1px solid rgba(120,200,140,0.4);
    }
    .game-item.unlocked:active { background: rgba(59,201,94,0.28); }
    .game-item.unlocked .game-icon-wrap {
        background: linear-gradient(135deg, #2a5a2f, #16321c);
    }
    .game-item.unlocked .game-status { color: #7ecf95; }
    .game-item.unlocked .game-status .dot { background: #3bc95e; }
    .play-tag {
        font-size: 10.5px; font-weight: 800; color: #06210d;
        background: linear-gradient(135deg, #7ee08a, #3bc95e);
        padding: 3px 10px; border-radius: 20px;
        flex-shrink: 0; white-space: nowrap;
        box-shadow: 0 3px 8px rgba(59,201,94,0.35);
    }

    .empty-note {
        text-align: center; color: #6a5480; font-size: 12.5px;
        padding: 18px 30px 8px; line-height: 1.6;
    }
</style>
</head>
<body>

<div id="screen">
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">
            🎮 Trò chơi
            <span class="header-badge">Sắp ra mắt</span>
        </div>
    </div>

    <div class="top-bar">
        <input type="text" id="search-game" placeholder="🔍 Tìm trò chơi..." oninput="filterGames()">
    </div>

    <div class="coming-banner">
        <div class="icon">🚀</div>
        <div>
            <div class="text-title">Chờ bố làm đã hahahahha</div>
            <div class="text-sub">Khoảng 20 năm nữa nhaa</div>
        </div>
    </div>

    <div id="list"></div>
</div>

<script>
    const games = [
        { icon: "🌱", name: "Nông Trại", unlocked: true, file: "trongcay" },
        { icon: "🚫", name: "Sắp ra mắt" },
        { icon: "🚫", name: "Sắp ra mắt" },
        { icon: "🚫", name: "Sắp ra mắt" },
        { icon: "🚫", name: "Sắp ra mắt" },
        { icon: "🚫", name: "Sắp ra mắt" },
        { icon: "🚫", name: "Sắp ra mắt" },
        { icon: "🚫", name: "Sắp ra mắt" },
    ];

    function renderGames(filter = "") {
        const list = document.getElementById('list');
        const f = filter.trim().toLowerCase();
        const filtered = games.filter(g => g.name.toLowerCase().includes(f));

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-note">Chưa có🎮</div>';
            return;
        }

        list.innerHTML = filtered.map(g => {
            if (g.unlocked) {
                return `
            <div class="game-item unlocked" onclick="openGame('${g.name}', '${g.file}')">
                <div class="game-icon-wrap">${g.icon}</div>
                <div class="game-info">
                    <div class="game-name">${g.name}</div>
                    <div class="game-status"><span class="dot"></span> · Đang mở, chơi ngay!</div>
                </div>
                <div class="play-tag">▶ Chơi ngay</div>
            </div>`;
            }
            return `
            <div class="game-item" onclick="openGame('${g.name}')">
                <div class="game-icon-wrap">${g.icon}</div>
                <div class="game-info">
                    <div class="game-name">${g.name}</div>
                    <div class="game-status"><span class="dot"></span> · Dự kiến 20 năm</div>
                </div>
                <div class="lock-tag">🔒 Chờ anh nhé</div>
            </div>`;
        }).join('');
    }

    function filterGames() {
        renderGames(document.getElementById('search-game').value);
    }

    function openGame(name, file) {
        if (file) {
            window.location.href = file;
            return;
        }
        alert(name + " đang được phát triển 🚧\nDự kiến ra mắt trong khoảng 20 năm nữa!");
    }

    function goBack() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = 'chat';
        }
    }

    renderGames();
</script>

</body>
</html>
