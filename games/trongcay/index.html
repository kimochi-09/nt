<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Nông Trại Vui Vẻ</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
        height: 100%; margin: 0; padding: 0; overflow: hidden;
        background: #060810;
        font-family: 'Nunito', -apple-system, system-ui, sans-serif;
        overscroll-behavior: none;
    }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    /* ============================================================
       Layout shell: on desktop this becomes a fixed "painting" —
       a centered frame that never scrolls, with side/top-bottom UI.
       On narrow/mobile viewports it falls back to the original
       vertical scrolling app layout.
       ============================================================ */
    #app {
        height: 100%; width: 100%;
        display: flex; align-items: center; justify-content: center;
        background:
            radial-gradient(1200px 700px at 50% -10%, rgba(60,140,80,0.18), transparent 60%),
            linear-gradient(180deg, #0c1a10 0%, #081208 60%, #050a06 100%);
    }

    #frame {
        position: relative;
        width: 100%; height: 100%;
        max-width: 1400px;
        max-height: 900px;
        display: flex; flex-direction: column;
        border-radius: 0;
        overflow: hidden;
        background: linear-gradient(180deg, #12321a 0%, #0d2413 55%, #091a0e 100%);
        box-shadow: none;
    }

    /* ===== Header ===== */
    .header {
        padding: 14px 16px 10px;
        display: flex; align-items: center; gap: 10px;
        border-bottom: 1px solid rgba(80,200,120,0.2);
        flex-shrink: 0;
        z-index: 5;
    }
    .back-btn {
        border: none; background: #16321c; color: #d8ffe0;
        font-size: 18px; font-family: inherit; cursor: pointer;
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .back-btn:active { transform: scale(0.9); }
    .header-title {
        font-size: 17px; font-weight: 800; color: #d8ffe0; flex: 1;
        display: flex; flex-direction: column; line-height: 1.25;
        min-width: 0;
    }
    .header-title .lvl { font-size: 11px; font-weight: 700; color: #7ecf95; }
    .coin-badge {
        font-size: 13.5px; font-weight: 800; color: #3a2600;
        background: linear-gradient(135deg, #ffe08a, #ffb238);
        padding: 7px 12px; border-radius: 20px;
        box-shadow: 0 3px 10px rgba(255,178,56,0.4);
        display: flex; align-items: center; gap: 5px;
        flex-shrink: 0;
        white-space: nowrap;
    }

    /* ===== Main body: farm stage (center) ===== */
    #body-row {
        flex: 1;
        display: flex;
        min-height: 0;
        overflow: hidden;
    }

    /* Side rail (decor + quick stats) - shown on wide frame only */
    .side-rail {
        width: 150px; flex-shrink: 0;
        padding: 16px 10px;
        display: none;
        flex-direction: column; gap: 10px;
        border-right: 1px solid rgba(80,200,120,0.15);
        overflow: hidden;
    }
    .side-rail.right { border-right: none; border-left: 1px solid rgba(80,200,120,0.15); }
    .rail-card {
        background: rgba(20,45,25,0.55);
        border: 1px solid rgba(120,200,140,0.2);
        border-radius: 14px; padding: 10px;
    }
    .rail-title { font-size: 11px; font-weight: 800; color: #9fd8ac; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .rail-decor-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .rail-decor-grid .decor-chip { font-size: 20px; }
    .rail-stat { display: flex; justify-content: space-between; font-size: 12.5px; color: #cfeed8; padding: 3px 0; }
    .rail-stat b { color: #ffd15c; }

    #farm-wrap {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding: 14px 12px 90px;
        position: relative;
        display: flex; flex-direction: column;
        align-items: center;
    }
    .decor-row {
        display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        margin-bottom: 12px; min-height: 4px;
    }
    .decor-chip {
        font-size: 22px; background: rgba(30,60,35,0.5);
        border: 1px solid rgba(120,200,140,0.25);
        border-radius: 12px; padding: 4px 10px;
    }

    #plots-grid {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
    }
    .plot {
        position: relative;
        aspect-ratio: 1 / 1;
        border-radius: 16px;
        background: radial-gradient(circle at 30% 20%, #3a2a18, #241a0f 70%);
        border: 2px solid rgba(140,90,40,0.5);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer;
        transition: transform .1s;
        overflow: hidden;
    }
    .plot:active { transform: scale(0.94); }
    .plot .icon { font-size: 30px; }
    .plot.empty { background: radial-gradient(circle at 30% 20%, #3a2c1a, #23180d 70%); }
    .plot.empty .icon { font-size: 26px; color: #7a5a2c; opacity: .8; }
    .plot.locked { background: rgba(20,20,25,0.6); border-color: rgba(120,120,130,0.25); }
    .plot.locked .icon { font-size: 22px; opacity: .6; }
    .plot.locked .lock-cost {
        font-size: 10.5px; font-weight: 800; color: #ffcda0; margin-top: 4px;
    }
    .plot.ready { border-color: #ffd15c; box-shadow: 0 0 14px rgba(255,209,92,0.55); animation: pulseReady 1.1s infinite; }
    .plot.giant { border-color: #ffb238; box-shadow: 0 0 18px rgba(255,178,56,0.75); }
    .plot.giant .icon { font-size: 40px; }
    .plot.mutant { border-color: #b388ff; box-shadow: 0 0 18px rgba(179,136,255,0.75); }
    .plot .special-tag {
        font-size: 8.5px; font-weight: 800; color: #3a2600; background: linear-gradient(135deg,#ffe08a,#ffb238);
        padding: 1px 6px; border-radius: 8px; margin-top: 2px;
    }
    .plot .special-tag.mutant-tag { color: #fff; background: linear-gradient(135deg,#c9a4ff,#8a5cf0); }
    @keyframes pulseReady { 0%,100%{ box-shadow:0 0 10px rgba(255,209,92,0.4);} 50%{ box-shadow:0 0 20px rgba(255,209,92,0.85);} }
    .plot .sparkle { position:absolute; top:4px; right:6px; font-size:14px; animation: spin 2s linear infinite; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

    .plot .timer {
        font-size: 10.5px; font-weight: 700; color: #d8ffe0; margin-top: 4px;
        background: rgba(0,0,0,0.35); padding: 1px 7px; border-radius: 10px;
    }
    .plot .care-icons { position: absolute; bottom: 4px; left: 0; right: 0; display: flex; justify-content: center; gap: 3px; }
    .plot .care-icons span { font-size: 11px; opacity: .9; }
    .plot .bar-wrap {
        width: 78%; height: 5px; border-radius: 4px; background: rgba(0,0,0,0.35);
        margin-top: 5px; overflow: hidden;
    }
    .plot .bar-fill { height: 100%; background: linear-gradient(90deg,#7ee08a,#3bc95e); border-radius: 4px; }

    .plot-name { position:absolute; top:4px; left:6px; font-size:9px; font-weight:800; color:#d8ffe0; opacity:.65; }

    /* floating +coin */
    .float-coin {
        position: fixed; font-weight: 900; font-size: 15px; color: #ffd15c;
        pointer-events: none; animation: floatUp 1s ease-out forwards;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        z-index: 50;
    }
    @keyframes floatUp { 0%{ transform: translateY(0); opacity:1;} 100%{ transform: translateY(-45px); opacity:0;} }

    /* ===== Bottom nav ===== */
    #bottom-nav {
        position: absolute; bottom: 0; left: 0; right: 0;
        display: flex; padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        background: rgba(10,20,12,0.92); border-top: 1px solid rgba(80,200,120,0.2);
        gap: 10px; z-index: 10;
    }
    .nav-btn {
        flex: 1; border: none; border-radius: 14px; padding: 11px 8px;
        font-family: inherit; font-weight: 800; font-size: 13.5px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 6px;
        background: rgba(50,90,55,0.5); color: #d8ffe0;
        border: 1px solid rgba(120,200,140,0.3);
        transition: background .15s;
    }
    .nav-btn.active { background: linear-gradient(135deg,#3bc95e,#1e9b45); color: #06210d; }
    .nav-btn:active { transform: scale(0.96); }

    /* ===== Toast ===== */
    #toast {
        position: absolute; top: 66px; left: 50%; transform: translateX(-50%) translateY(-20px);
        background: rgba(20,30,20,0.95); color: #d8ffe0; padding: 9px 16px; border-radius: 20px;
        font-size: 13px; font-weight: 700; border: 1px solid rgba(120,200,140,0.3);
        opacity: 0; transition: all .25s; pointer-events: none; z-index: 100; white-space: nowrap;
        max-width: 90%; text-overflow: ellipsis; overflow: hidden;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== Modal ===== */
    .modal-bg {
        position: absolute; inset: 0; background: rgba(0,0,0,0.6);
        display: none; align-items: flex-end; justify-content: center; z-index: 60;
    }
    .modal-bg.show { display: flex; }
    .modal-sheet {
        width: 100%; max-width: 480px; max-height: 78%; background: #101d13;
        border-radius: 20px 20px 0 0; padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
        overflow-y: auto; border-top: 1px solid rgba(120,200,140,0.25);
    }
    .modal-title { font-size: 16px; font-weight: 800; color: #d8ffe0; margin-bottom: 10px; display:flex; align-items:center; justify-content:space-between; }
    .modal-close { background: #16321c; border: none; color: #d8ffe0; width: 30px; height: 30px; border-radius: 50%; font-size: 15px; cursor: pointer; }

    .shop-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .shop-tab {
        flex: 1; text-align: center; padding: 8px 4px; border-radius: 10px; font-size: 12px; font-weight: 800;
        background: rgba(50,90,55,0.4); color: #a8d9b4; cursor: pointer; border: 1px solid transparent;
    }
    .shop-tab.active { background: rgba(59,201,94,0.25); color: #d8ffe0; border-color: rgba(120,200,140,0.4); }

    .item-row {
        display: flex; align-items: center; gap: 12px; padding: 11px 8px;
        border-bottom: 1px solid rgba(120,200,140,0.12);
    }
    .item-row .item-icon { font-size: 26px; width: 40px; text-align: center; flex-shrink: 0; }
    .item-row .item-info { flex: 1; min-width: 0; }
    .item-row .item-name { font-size: 14px; font-weight: 800; color: #d8ffe0; }
    .item-row .item-sub { font-size: 11.5px; color: #8fbf9a; margin-top: 2px; line-height: 1.4; }
    .item-row .buy-btn {
        border: none; border-radius: 12px; padding: 8px 12px; font-family: inherit;
        font-weight: 800; font-size: 12.5px; cursor: pointer; flex-shrink: 0;
        background: linear-gradient(135deg,#ffe08a,#ffb238); color: #3a2600;
    }
    .item-row .buy-btn:disabled { opacity: .4; }
    .item-row .buy-btn.owned { background: rgba(120,200,140,0.25); color: #d8ffe0; }

    .action-btn {
        width: 100%; border: none; border-radius: 12px; padding: 12px; margin-top: 8px;
        font-family: inherit; font-weight: 800; font-size: 14px; cursor: pointer;
        background: rgba(59,201,94,0.18); color: #d8ffe0; border: 1px solid rgba(120,200,140,0.35);
    }
    .action-btn:disabled { opacity: .35; }
    .action-btn.primary { background: linear-gradient(135deg,#3bc95e,#1e9b45); color: #06210d; }
    .action-btn.danger { background: rgba(255,94,58,0.2); color: #ffb08a; border-color: rgba(255,94,58,0.4); }

    .plant-info-box {
        text-align: center; padding: 10px 0 4px;
    }
    .plant-info-box .icon { font-size: 44px; }
    .plant-info-box .name { font-size: 16px; font-weight: 800; color: #d8ffe0; margin-top: 4px; }
    .plant-info-box .sub { font-size: 12.5px; color: #8fbf9a; margin-top: 2px; }

    #loading {
        position: absolute; inset: 0; background: #08120d; z-index: 200;
        display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px;
        color: #7ecf95; font-weight: 800; font-size: 14px;
    }
    .spinner {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid rgba(120,200,140,0.25); border-top-color: #3bc95e;
        animation: spin 0.8s linear infinite;
    }

    /* ============================================================
       Desktop / wide-viewport "static painting" mode:
       fixed frame, no page scroll, side rails visible,
       farm stage never scrolls either (fits entirely on screen).
       ============================================================ */
    @media (min-width: 900px) and (min-height: 560px) {
        #app { padding: 24px; }
        #frame {
            border-radius: 22px;
            border: 1px solid rgba(120,200,140,0.18);
            box-shadow: 0 30px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .side-rail { display: flex; }
        #farm-wrap {
            overflow: hidden;
            justify-content: center;
            padding-bottom: 100px;
        }
        #plots-grid {
            max-width: 720px;
            gap: 14px;
        }
        .plot .icon { font-size: 36px; }
        .modal-bg { align-items: center; }
        .modal-sheet { border-radius: 20px; max-height: 82%; }
    }
</style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div>Đang tải nông trại...</div>
</div>

<div id="app" style="display:none;">
<div id="frame">
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">
            🌾 Nông Trại 
            <span class="lvl" id="lvl-label">Cấp 1</span>
        </div>
        <div class="coin-badge">🪙 <span id="coin-count">0</span></div>
    </div>

    <div id="toast"></div>

    <div id="body-row">
        <div class="side-rail" id="side-rail-left">
            <div class="rail-card">
                <div class="rail-title">Trang trí</div>
                <div class="rail-decor-grid" id="decor-row-side"></div>
            </div>
            <div class="rail-card">
                <div class="rail-title">Thống kê</div>
                <div class="rail-stat">Đã kiếm <b id="stat-total">0</b></div>
                <div class="rail-stat">Ô đất <b id="stat-plots">4/16</b></div>
            </div>
        </div>

        <div id="farm-wrap">
            <div class="decor-row" id="decor-row"></div>
            <div id="plots-grid"></div>
        </div>

        <div class="side-rail right" id="side-rail-right">
            <div class="rail-card">
                <div class="rail-title">Kho vật phẩm</div>
                <div class="rail-stat">✨ Phân bón thần kỳ <b id="stat-fert">0</b></div>
                <div class="rail-stat">🧪 Thuốc trừ sâu <b id="stat-pest">0</b></div>
            </div>
            <div class="rail-card">
                <div class="rail-title">Nâng cấp</div>
                <div class="rail-stat">💦 Tưới siêu tốc <b id="stat-water">Chưa có</b></div>
                <div class="rail-stat">🧺 Tự thu hoạch <b id="stat-auto">Chưa có</b></div>
            </div>
        </div>
    </div>

    <div id="bottom-nav">
        <button class="nav-btn active" id="tab-farm" onclick="switchMainTab('farm')">🌱 Nông trại</button>
        <button class="nav-btn" id="tab-shop" onclick="switchMainTab('shop')">🛒 Cửa hàng</button>
    </div>
</div>
</div>

<!-- Modal: chọn hạt giống để trồng -->
<div class="modal-bg" id="seed-modal">
    <div class="modal-sheet">
        <div class="modal-title">🌱 Chọn hạt giống <button class="modal-close" onclick="closeModal('seed-modal')">✕</button></div>
        <div id="seed-list"></div>
    </div>
</div>

<!-- Modal: chăm sóc / thu hoạch cây đang trồng -->
<div class="modal-bg" id="care-modal">
    <div class="modal-sheet">
        <div class="modal-title">🌿 Chăm sóc cây <button class="modal-close" onclick="closeModal('care-modal')">✕</button></div>
        <div class="plant-info-box" id="care-info"></div>
        <div id="care-actions"></div>
    </div>
</div>

<!-- Modal: mở khóa ô đất -->
<div class="modal-bg" id="unlock-modal">
    <div class="modal-sheet">
        <div class="modal-title">🔓 Mở ô đất mới <button class="modal-close" onclick="closeModal('unlock-modal')">✕</button></div>
        <div id="unlock-info"></div>
    </div>
</div>

<!-- Modal: cửa hàng -->
<div class="modal-bg" id="shop-modal">
    <div class="modal-sheet">
        <div class="modal-title">🛒 Cửa hàng <button class="modal-close" onclick="closeModal('shop-modal')">✕</button></div>
        <div class="shop-tabs">
            <div class="shop-tab active" data-tab="seeds" onclick="switchShopTab('seeds')">Hạt giống</div>
            <div class="shop-tab" data-tab="upgrades" onclick="switchShopTab('upgrades')">Nâng cấp</div>
            <div class="shop-tab" data-tab="items" onclick="switchShopTab('items')">Vật phẩm</div>
            <div class="shop-tab" data-tab="decor" onclick="switchShopTab('decor')">Trang trí</div>
        </div>
        <div id="shop-content"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

        hat:       { name: "Nón nông dân", icon: "👒", cost: 120 },
        // Trang trí giới hạn — chỉ có được qua Rương May Mắn
        goldenStatue: { name: "Tượng Vàng", icon: "🏆", cost: 0, limited: true },
        rainbowFlag:  { name: "Cờ Cầu Vồng", icon: "🎏", cost: 0, limited: true },
    };
    const PEST_CHANCE = 0.15; // 15% khả năng sâu bệnh nếu không có bảo vệ
    const MUTATION_CHANCE = 0.30; // 30% cơ hội đột biến khi dùng Bánh Đột Biến
    const LUCKY_CHEST_COST = 200;
    const LUCKY_RARE_SEEDS = ['goldenGrape', 'magicMango'];
    const LUCKY_LIMITED_DECOR = ['goldenStatue', 'rainbowFlag'];

    let state = null; // trạng thái game hiện tại (đồng bộ với Firebase)
    let activePlotIdx = null;
    let currentShopTab = 'seeds';
    let tickTimer = null;

    // Giới hạn cho Phân bón thần kỳ
    const FERT_COOLDOWN_MS = 10 * 60 * 1000; // 10 phút hồi giữa 2 lần dùng
    const FERT_DAILY_USE_LIMIT = 3;   // tối đa 3 lần dùng/ngày
    const FERT_DAILY_BUY_LIMIT = 3;   // tối đa 3 lần mua/ngày

    // Giới hạn cho Bánh Đột Biến (cùng quy tắc như Phân bón thần kỳ)
    const MUTATION_COOLDOWN_MS = 10 * 60 * 1000;
    const MUTATION_DAILY_USE_LIMIT = 3;
    const MUTATION_DAILY_BUY_LIMIT = 3;

    function todayKey() {
        const d = new Date();
        return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
    }

    function defaultState() {
        return {
            coins: 50,
            totalEarned: 0,
            unlockedPlots: 4,
            plots: {},
            upgrades: { fastWater: false, autoHarvest: false },
            inventory: { magicFertilizer: 0, pesticide: 0, mutationCookie: 0, pureWater: 0 },
            decor: { scarecrow: false, fence: false, hut: false, hat: false, goldenStatue: false, rainbowFlag: false },
            fertLimits: { day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0 },
            mutationLimits: { day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0 },
        };
    }

    // Đảm bảo bộ đếm giới hạn phân bón/bánh đột biến được reset mỗi ngày mới
    function ensureFertLimits() {
        if (!state.fertLimits) {
            state.fertLimits = { day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0 };
            return;
        }
        if (state.fertLimits.day !== todayKey()) {
            state.fertLimits = { day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0 };
        }
    }

    function ensureMutationLimits() {
        if (!state.mutationLimits) {
            state.mutationLimits = { day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0 };
            return;
        }
        if (state.mutationLimits.day !== todayKey()) {
            state.mutationLimits = { day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0 };
        }
    }

    // ===== Đăng nhập (giống chat.html) =====
    let authChecked = false;
    auth.onAuthStateChanged(user => {
        const savedId = localStorage.getItem('nt_myId');
        if (user && savedId) {
            myId = savedId;
            gameRef = db.ref('farm_game/' + myId);
            startGame();
        } else if (authChecked) {
            window.location.href = '/';
        }
        authChecked = true;
    });
    setTimeout(() => { if (!myId) window.location.href = '/'; }, 3000);

    function startGame() {
        gameRef.once('value').then(snap => {
            if (!snap.exists()) {
                state = defaultState();
                gameRef.set(state);
            } else {
                state = Object.assign(defaultState(), snap.val());
                state.plots = snap.val().plots || {};
                state.upgrades = Object.assign({fastWater:false, autoHarvest:false}, snap.val().upgrades);
                state.inventory = Object.assign({magicFertilizer:0, pesticide:0, mutationCookie:0, pureWater:0}, snap.val().inventory);
                state.decor = Object.assign({scarecrow:false, fence:false, hut:false, hat:false, goldenStatue:false, rainbowFlag:false}, snap.val().decor);
                state.fertLimits = Object.assign({day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0}, snap.val().fertLimits);
                state.mutationLimits = Object.assign({day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0}, snap.val().mutationLimits);
            }
            ensureFertLimits();
            ensureMutationLimits();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            render();
            gameRef.on('value', snap => {
                if (!snap.exists()) return;
                state = Object.assign(defaultState(), snap.val());
                state.plots = snap.val().plots || {};
                state.upgrades = Object.assign({fastWater:false, autoHarvest:false}, snap.val().upgrades);
                state.inventory = Object.assign({magicFertilizer:0, pesticide:0, mutationCookie:0, pureWater:0}, snap.val().inventory);
                state.decor = Object.assign({scarecrow:false, fence:false, hut:false, hat:false, goldenStatue:false, rainbowFlag:false}, snap.val().decor);
                state.fertLimits = Object.assign({day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0}, snap.val().fertLimits);
                state.mutationLimits = Object.assign({day: todayKey(), usedCount: 0, buyCount: 0, lastUsedAt: 0}, snap.val().mutationLimits);
                ensureFertLimits();
                ensureMutationLimits();
                render();
            });
            tickTimer = setInterval(gameTick, 1000);
        });
    }

    function save() {
        gameRef.set(state);
    }

    function goBack() {
        if (window.history.length > 1) window.history.back();
        else window.location.href = 'games.html';
    }

    // ===== Toast =====
    let toastTimer = null;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ===== Level (chỉ mang tính hiển thị, dựa trên tổng xu đã kiếm) =====
    function computeLevel() {
        const total = state.totalEarned || 0;
        return Math.min(30, Math.floor(total / 200) + 1);
    }

    // ===== Render =====
    function render() {
        document.getElementById('coin-count').textContent = state.coins.toLocaleString('vi-VN');
        document.getElementById('lvl-label').textContent = 'Cấp ' + computeLevel();

        // decor row (mobile, inline above grid)
        const ownedDecor = Object.keys(DECOR).filter(k => state.decor[k]);
        const decorHtml = ownedDecor.map(k => `<div class="decor-chip">${DECOR[k].icon}</div>`).join('');
        document.getElementById('decor-row').innerHTML = decorHtml;
        document.getElementById('decor-row-side').innerHTML = decorHtml || '<span style="font-size:12px;color:#7fa88a;">Chưa có</span>';

        // side rail stats (desktop)
        document.getElementById('stat-total').textContent = (state.totalEarned || 0).toLocaleString('vi-VN');
        document.getElementById('stat-plots').textContent = state.unlockedPlots + '/' + MAX_PLOTS;
        document.getElementById('stat-fert').textContent = state.inventory.magicFertilizer || 0;
        document.getElementById('stat-pest').textContent = state.inventory.pesticide || 0;
        document.getElementById('stat-water').textContent = state.upgrades.fastWater ? 'Đã có' : 'Chưa có';
        document.getElementById('stat-auto').textContent = state.upgrades.autoHarvest ? 'Đã có' : 'Chưa có';

        // plots
        const grid = document.getElementById('plots-grid');
        grid.innerHTML = '';
        for (let i = 0; i < MAX_PLOTS; i++) {
            grid.appendChild(renderPlot(i));
        }
    }

    function renderPlot(i) {
        const div = document.createElement('div');
        div.className = 'plot';
        div.onclick = () => onPlotTap(i);

        if (i >= state.unlockedPlots) {
            div.classList.add('locked');
            const costIdx = i - 4;
            const cost = PLOT_COSTS[costIdx] ?? 9999;
            div.innerHTML = `<div class="icon">🔒</div><div class="lock-cost">${cost.toLocaleString('vi-VN')} xu</div>`;
            return div;
        }

        const plant = state.plots[i];
        if (!plant) {
            div.classList.add('empty');
            div.innerHTML = `<div class="icon">➕</div>`;
            return div;
        }

        const seed = SEEDS[plant.seed];
        const waterFactor = plant.waterBoost === 'pure' ? 0.65 : (plant.watered ? 0.8 : 1);
        const growDuration = seed.growSec * waterFactor;
        const elapsed = (Date.now() - plant.plantedAt) / 1000;
        const remaining = Math.max(0, growDuration - elapsed);
        const pct = Math.min(100, Math.round((elapsed / growDuration) * 100));

        if (remaining <= 0) {
            div.classList.add('ready');
            if (plant.giant) div.classList.add('giant');
            if (plant.mutant) div.classList.add('mutant');
            const specialTag = plant.giant ? '<div class="special-tag">🌟 Khổng Lồ x3</div>' : (plant.mutant ? '<div class="special-tag mutant-tag">🧬 Đột Biến</div>' : '');
            div.innerHTML = `
                <div class="plot-name">${seed.name}</div>
                <span class="sparkle">✨</span>
                <div class="icon">${seed.icon}</div>
                ${specialTag}
                <div class="timer">Đã chín! Chạm để thu hoạch</div>
            `;
        } else {
            div.innerHTML = `
                <div class="plot-name">${seed.name}</div>
                <div class="icon">${seed.icon}</div>
                <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
                <div class="timer">${formatTime(remaining)}</div>
                <div class="care-icons">
                    ${plant.waterBoost === 'pure' ? '<span>💎</span>' : (plant.watered ? '<span>💧</span>' : '')}
                    ${plant.fertilized ? '<span>🌟</span>' : ''}
                    ${plant.protected ? '<span>🛡️</span>' : ''}
                </div>
            `;
        }
        return div;
    }

    function formatTime(sec) {
        sec = Math.ceil(sec);
        if (sec < 60) return sec + 's';
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        if (m < 60) return m + 'p ' + s + 's';
        const h = Math.floor(m / 60);
        return h + 'g ' + (m % 60) + 'p';
    }

    // ===== Tick: cập nhật đồng hồ + tự động thu hoạch =====
    function gameTick() {
        if (!state) return;
        let changed = false;
        if (state.upgrades.autoHarvest) {
            Object.keys(state.plots).forEach(key => {
                const plant = state.plots[key];
                const seed = SEEDS[plant.seed];
                const waterFactor = plant.waterBoost === 'pure' ? 0.65 : (plant.watered ? 0.8 : 1);
                const growDuration = seed.growSec * waterFactor;
                const elapsed = (Date.now() - plant.plantedAt) / 1000;
                if (elapsed >= growDuration) {
                    const earned = harvestPlant(key, plant, seed, true);
                    changed = true;
                }
            });
        }
        // chỉ vẽ lại đồng hồ đếm ngược, không ghi Firebase liên tục
        renderTimersOnly();
        if (changed) save();
    }

    function renderTimersOnly() {
        // render lại toàn bộ nhẹ nhàng (số ô ít nên không tốn kém)
        render();
    }

    // ===== Tương tác ô đất =====
    function onPlotTap(i) {
        if (i >= state.unlockedPlots) {
            openUnlockModal(i);
            return;
        }
        const plant = state.plots[i];
        if (!plant) {
            openSeedModal(i);
            return;
        }
        const seed = SEEDS[plant.seed];
        const waterFactor = plant.waterBoost === 'pure' ? 0.65 : (plant.watered ? 0.8 : 1);
        const growDuration = seed.growSec * waterFactor;
        const elapsed = (Date.now() - plant.plantedAt) / 1000;
        if (elapsed >= growDuration) {
            doHarvestWithFx(i);
        } else {
            openCareModal(i);
        }
    }

    // ===== Trồng cây =====
    function openSeedModal(plotIdx) {
        activePlotIdx = plotIdx;
        const list = document.getElementById('seed-list');
        list.innerHTML = Object.keys(SEEDS).map(key => {
            const s = SEEDS[key];
            const canAfford = state.coins >= s.cost;
            return `
            <div class="item-row">
                <div class="item-icon">${s.icon}</div>
                <div class="item-info">
                    <div class="item-name">${s.name}</div>
                    <div class="item-sub">Giá ${s.cost} xu · ${formatTime(s.growSec)} · Bán ${s.sell} xu</div>
                </div>
                <button class="buy-btn" ${canAfford ? '' : 'disabled'} onclick="plantSeed('${key}')">Trồng</button>
            </div>`;
        }).join('');
        openModal('seed-modal');
    }

    function plantSeed(key) {
        const seed = SEEDS[key];
        if (state.coins < seed.cost) { showToast('Không đủ xu!'); return; }
        state.coins -= seed.cost;
        state.plots[activePlotIdx] = {
            seed: key,
            plantedAt: Date.now(),
            watered: !!state.upgrades.fastWater,
            waterBoost: state.upgrades.fastWater ? 'basic' : null,
            fertilized: false,
            protected: false,
            giant: false,
            mutant: false,
        };
        closeModal('seed-modal');
        render();
        save();
        showToast('Đã trồng ' + seed.name + '!');
    }

    // ===== Chăm sóc cây =====
    function openCareModal(plotIdx) {
        activePlotIdx = plotIdx;
        const plant = state.plots[plotIdx];
        const seed = SEEDS[plant.seed];
        const waterFactor = plant.waterBoost === 'pure' ? 0.65 : (plant.watered ? 0.8 : 1);
        const growDuration = seed.growSec * waterFactor;
        const elapsed = (Date.now() - plant.plantedAt) / 1000;
        const remaining = Math.max(0, growDuration - elapsed);

        document.getElementById('care-info').innerHTML = `
            <div class="icon">${seed.icon}</div>
            <div class="name">${seed.name}</div>
            <div class="sub">Còn lại ${formatTime(remaining)}${plant.fertilized ? ' · Bán 150% giá' : ''}</div>
        `;

        const actions = document.getElementById('care-actions');
        let html = '';

        // Tưới nước thường
        html += `<button class="action-btn" ${plant.watered ? 'disabled' : ''} onclick="waterPlant()">💧 Tưới nước ${plant.watered ? '(đã tưới)' : '(giảm 20% thời gian)'}</button>`;

        // Nước Thuần Khiết — tưới cao cấp, thay thế tưới thường, hiệu quả cao hơn
        const pureWaterDisabled = plant.waterBoost === 'pure' || state.inventory.pureWater <= 0;
        let pureWaterLabel = `💎 Dùng Nước Thuần Khiết (${state.inventory.pureWater} còn lại) - giảm 35% thời gian`;
        if (plant.waterBoost === 'pure') pureWaterLabel = '💎 Đã dùng Nước Thuần Khiết';
        html += `<button class="action-btn" ${pureWaterDisabled ? 'disabled' : ''} onclick="usePureWater()">${pureWaterLabel}</button>`;

        html += `<button class="action-btn" ${plant.fertilized ? 'disabled' : ''} onclick="fertilizePlant()">🌟 Bón phân ${plant.fertilized ? '(đã bón)' : '(tăng 50% xu khi bán)'}</button>`;

        ensureFertLimits();
        const fertRemaining = Math.max(0, FERT_DAILY_USE_LIMIT - state.fertLimits.usedCount);
        const fertCooldownLeft = state.fertLimits.lastUsedAt ? (FERT_COOLDOWN_MS - (Date.now() - state.fertLimits.lastUsedAt)) : 0;
        let fertLabel = `✨ Dùng phân bón thần kỳ (${state.inventory.magicFertilizer} còn lại) - chín ngay`;
        let fertDisabled = state.inventory.magicFertilizer <= 0;
        if (fertRemaining <= 0) {
            fertLabel = `✨ Đã dùng hết lượt hôm nay (tối đa ${FERT_DAILY_USE_LIMIT}/ngày)`;
            fertDisabled = true;
        } else if (fertCooldownLeft > 0) {
            fertLabel = `✨ Đang hồi (còn ${formatTime(fertCooldownLeft/1000)})`;
            fertDisabled = true;
        } else {
            fertLabel += ` · Còn ${fertRemaining} lượt hôm nay`;
        }
        html += `<button class="action-btn" ${fertDisabled ? 'disabled' : ''} onclick="useMagicFertilizer()">${fertLabel}</button>`;

        // Bánh Đột Biến
        ensureMutationLimits();
        const mutRemaining = Math.max(0, MUTATION_DAILY_USE_LIMIT - state.mutationLimits.usedCount);
        const mutCooldownLeft = state.mutationLimits.lastUsedAt ? (MUTATION_COOLDOWN_MS - (Date.now() - state.mutationLimits.lastUsedAt)) : 0;
        let mutLabel = `🍪 Dùng Bánh Đột Biến (${state.inventory.mutationCookie} còn lại) - 30% cơ hội đột biến`;
        let mutDisabled = state.inventory.mutationCookie <= 0 || plant.giant || plant.mutant;
        if (plant.giant || plant.mutant) {
            mutLabel = '🍪 Cây đã đột biến rồi';
            mutDisabled = true;
        } else if (mutRemaining <= 0) {
            mutLabel = `🍪 Đã dùng hết lượt hôm nay (tối đa ${MUTATION_DAILY_USE_LIMIT}/ngày)`;
            mutDisabled = true;
        } else if (mutCooldownLeft > 0) {
            mutLabel = `🍪 Đang hồi (còn ${formatTime(mutCooldownLeft/1000)})`;
            mutDisabled = true;
        } else if (state.inventory.mutationCookie > 0) {
            mutLabel += ` · Còn ${mutRemaining} lượt hôm nay`;
        }
        html += `<button class="action-btn" ${mutDisabled ? 'disabled' : ''} onclick="useMutationCookie()">${mutLabel}</button>`;

        html += `<button class="action-btn" ${(!plant.protected && state.inventory.pesticide > 0) ? '' : 'disabled'} onclick="usePesticide()">🧪 Dùng thuốc trừ sâu (${state.inventory.pesticide} còn lại)${plant.protected ? ' - đã bảo vệ' : ''}</button>`;
        actions.innerHTML = html;

        openModal('care-modal');
    }

    function waterPlant() {
        const plant = state.plots[activePlotIdx];
        if (!plant || plant.watered) return;
        plant.watered = true;
        if (!plant.waterBoost) plant.waterBoost = 'basic';
        save(); render(); openCareModal(activePlotIdx);
        showToast('Đã tưới nước 💧');
    }

    function usePureWater() {
        const plant = state.plots[activePlotIdx];
        if (!plant || plant.waterBoost === 'pure' || state.inventory.pureWater <= 0) return;
        state.inventory.pureWater -= 1;
        plant.watered = true;
        plant.waterBoost = 'pure';
        save(); render(); openCareModal(activePlotIdx);
        showToast('Đã dùng Nước Thuần Khiết 💎');
    }

    function fertilizePlant() {
        const plant = state.plots[activePlotIdx];
        if (!plant || plant.fertilized) return;
        plant.fertilized = true;
        save(); render(); openCareModal(activePlotIdx);
        showToast('Đã bón phân 🌟');
    }

    function useMagicFertilizer() {
        const plant = state.plots[activePlotIdx];
        if (!plant || state.inventory.magicFertilizer <= 0) return;
        ensureFertLimits();
        if (state.fertLimits.usedCount >= FERT_DAILY_USE_LIMIT) {
            showToast('Đã dùng hết lượt phân bón hôm nay!');
            return;
        }
        const cooldownLeft = state.fertLimits.lastUsedAt ? (FERT_COOLDOWN_MS - (Date.now() - state.fertLimits.lastUsedAt)) : 0;
        if (cooldownLeft > 0) {
            showToast('Còn hồi ' + formatTime(cooldownLeft / 1000) + ' nữa!');
            return;
        }
        state.inventory.magicFertilizer -= 1;
        state.fertLimits.usedCount += 1;
        state.fertLimits.lastUsedAt = Date.now();
        const seed = SEEDS[plant.seed];
        const waterFactor = plant.waterBoost === 'pure' ? 0.65 : (plant.watered ? 0.8 : 1);
        const growDuration = seed.growSec * waterFactor;
        plant.plantedAt = Date.now() - growDuration * 1000; // đẩy về mốc đã chín
        save(); render();
        closeModal('care-modal');
        showToast('Cây đã chín ngay lập tức! ✨');
    }

    // ===== Bánh Đột Biến =====
    function useMutationCookie() {
        const plant = state.plots[activePlotIdx];
        if (!plant || state.inventory.mutationCookie <= 0) return;
        if (plant.giant || plant.mutant) { showToast('Cây này đã đột biến rồi!'); return; }
        ensureMutationLimits();
        if (state.mutationLimits.usedCount >= MUTATION_DAILY_USE_LIMIT) {
            showToast('Đã dùng hết lượt Bánh Đột Biến hôm nay!');
            return;
        }
        const cooldownLeft = state.mutationLimits.lastUsedAt ? (MUTATION_COOLDOWN_MS - (Date.now() - state.mutationLimits.lastUsedAt)) : 0;
        if (cooldownLeft > 0) {
            showToast('Còn hồi ' + formatTime(cooldownLeft / 1000) + ' nữa!');
            return;
        }
        state.inventory.mutationCookie -= 1;
        state.mutationLimits.usedCount += 1;
        state.mutationLimits.lastUsedAt = Date.now();

        if (Math.random() < MUTATION_CHANCE) {
            // 50/50 giữa Khổng Lồ (x3 xu) và Đột Biến (nhận hạt hiếm)
            if (Math.random() < 0.5) {
                plant.giant = true;
                save(); render(); openCareModal(activePlotIdx);
                showToast('Cây đã biến thành Cây Khổng Lồ! 🌟 (bán x3 xu)');
            } else {
                plant.mutant = true;
                const rareKey = LUCKY_RARE_SEEDS[Math.floor(Math.random() * LUCKY_RARE_SEEDS.length)];
                state.inventory[rareKey] = (state.inventory[rareKey] || 0) + 1;
                save(); render(); openCareModal(activePlotIdx);
                showToast('Cây đã Đột Biến! 🧬 Nhận thêm hạt ' + SEEDS[rareKey].name);
            }
        } else {
            save(); render(); openCareModal(activePlotIdx);
            showToast('Không có gì xảy ra... thử lại lần khác 🍪');
        }
    }

    function usePesticide() {
        const plant = state.plots[activePlotIdx];
        if (!plant || plant.protected || state.inventory.pesticide <= 0) return;
        state.inventory.pesticide -= 1;
        plant.protected = true;
        save(); render(); openCareModal(activePlotIdx);
        showToast('Cây đã được bảo vệ khỏi sâu bệnh 🛡️');
    }

    // ===== Thu hoạch =====
    function harvestPlant(key, plant, seed, isAuto) {
        let reward = seed.sell;
        if (plant.fertilized) reward = Math.round(reward * 1.5);
        let pestHit = false;
        if (!plant.protected && Math.random() < PEST_CHANCE) {
            reward = Math.round(reward * 0.5);
            pestHit = true;
        }
        state.coins += reward;
        state.totalEarned = (state.totalEarned || 0) + reward;
        delete state.plots[key];
        if (isAuto) {
            showToast((pestHit ? 'Sâu bệnh phá hoại! ' : 'Tự động thu hoạch: ') + '+' + reward + ' xu');
        }
        return reward;
    }

    function doHarvestWithFx(i) {
        const plant = state.plots[i];
        const seed = SEEDS[plant.seed];
        const plotEl = document.querySelectorAll('.plot')[i];
        const reward = harvestPlant(i, plant, seed, false);
        render();
        save();
        showToast('Thu hoạch ' + seed.name + ': +' + reward + ' xu 🪙');
        if (plotEl) spawnFloatCoin(plotEl, reward);
    }

    function spawnFloatCoin(el, amount) {
        const rect = el.getBoundingClientRect();
        const f = document.createElement('div');
        f.className = 'float-coin';
        f.textContent = '+' + amount;
        f.style.left = (rect.left + rect.width / 2 - 16) + 'px';
        f.style.top = (rect.top - 4) + 'px';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 1000);
    }

    // ===== Mở khóa ô đất =====
    function openUnlockModal(i) {
        activePlotIdx = i;
        const costIdx = i - 4;
        const cost = PLOT_COSTS[costIdx] ?? 9999;
        document.getElementById('unlock-info').innerHTML = `
            <div class="plant-info-box">
                <div class="icon">🔓</div>
                <div class="name">Mở ô đất số ${i + 1}</div>
                <div class="sub">Chi phí: ${cost.toLocaleString('vi-VN')} xu</div>
            </div>
            <button class="action-btn primary" ${state.coins >= cost ? '' : 'disabled'} onclick="unlockPlot(${i}, ${cost})">Mở ngay</button>
        `;
        openModal('unlock-modal');
    }

    function unlockPlot(i, cost) {
        if (state.coins < cost) { showToast('Không đủ xu!'); return; }
        state.coins -= cost;
        state.unlockedPlots = Math.max(state.unlockedPlots, i + 1);
        closeModal('unlock-modal');
        render(); save();
        showToast('Đã mở ô đất mới! 🎉');
    }

    // ===== Cửa hàng =====
    function switchMainTab(tab) {
        document.getElementById('tab-farm').classList.toggle('active', tab === 'farm');
        document.getElementById('tab-shop').classList.toggle('active', tab === 'shop');
        if (tab === 'shop') {
            switchShopTab(currentShopTab);
            openModal('shop-modal');
        }
    }

    function switchShopTab(tab) {
        currentShopTab = tab;
        document.querySelectorAll('.shop-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
        const content = document.getElementById('shop-content');

        if (tab === 'seeds') {
            content.innerHTML = `<div class="item-sub" style="padding:6px 4px 12px;">Chạm vào ô đất trống trên Nông trại để mua hạt giống và trồng ngay.</div>` +
                Object.values(SEEDS).map(s => `
                <div class="item-row">
                    <div class="item-icon">${s.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${s.name}</div>
                        <div class="item-sub">Giá ${s.cost} xu · ${formatTime(s.growSec)} · Bán ${s.sell} xu</div>
                    </div>
                </div>`).join('');
        } else if (tab === 'upgrades') {
            content.innerHTML = Object.keys(UPGRADES).map(key => {
                const u = UPGRADES[key];
                const owned = state.upgrades[key];
                return `
                <div class="item-row">
                    <div class="item-icon">${u.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${u.name}</div>
                        <div class="item-sub">${u.desc}</div>
                    </div>
                    <button class="buy-btn ${owned ? 'owned' : ''}" ${owned || state.coins < u.cost ? 'disabled' : ''} onclick="buyUpgrade('${key}')">${owned ? 'Đã có' : u.cost + ' xu'}</button>
                </div>`;
            }).join('');
        } else if (tab === 'items') {
            ensureFertLimits();
            content.innerHTML = Object.keys(ITEMS).map(key => {
                const it = ITEMS[key];
                if (key === 'magicFertilizer') {
                    const buysLeft = Math.max(0, FERT_DAILY_BUY_LIMIT - state.fertLimits.buyCount);
                    const limitReached = buysLeft <= 0;
                    return `
                    <div class="item-row">
                        <div class="item-icon">${it.icon}</div>
                        <div class="item-info">
                            <div class="item-name">${it.name} <span style="color:#8fbf9a;font-weight:700;">x${state.inventory[key]}</span></div>
                            <div class="item-sub">${it.desc} · Mua tối đa ${FERT_DAILY_BUY_LIMIT}/ngày (còn ${buysLeft} lượt hôm nay)</div>
                        </div>
                        <button class="buy-btn" ${(state.coins < it.cost || limitReached) ? 'disabled' : ''} onclick="buyItem('${key}')">${limitReached ? 'Hết lượt' : it.cost + ' xu'}</button>
                    </div>`;
                }
                return `
                <div class="item-row">
                    <div class="item-icon">${it.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${it.name} <span style="color:#8fbf9a;font-weight:700;">x${state.inventory[key]}</span></div>
                        <div class="item-sub">${it.desc}</div>
                    </div>
                    <button class="buy-btn" ${state.coins < it.cost ? 'disabled' : ''} onclick="buyItem('${key}')">${it.cost} xu</button>
                </div>`;
            }).join('');
        } else if (tab === 'decor') {
            content.innerHTML = Object.keys(DECOR).map(key => {
                const d = DECOR[key];
                const owned = state.decor[key];
                return `
                <div class="item-row">
                    <div class="item-icon">${d.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${d.name}</div>
                        <div class="item-sub">Trang trí cho nông trại</div>
                    </div>
                    <button class="buy-btn ${owned ? 'owned' : ''}" ${owned || state.coins < d.cost ? 'disabled' : ''} onclick="buyDecor('${key}')">${owned ? 'Đã có' : d.cost + ' xu'}</button>
                </div>`;
            }).join('');
        }
    }

    function buyUpgrade(key) {
        const u = UPGRADES[key];
        if (state.upgrades[key] || state.coins < u.cost) return;
        state.coins -= u.cost;
        state.upgrades[key] = true;
        save(); render(); switchShopTab('upgrades');
        showToast('Đã mua ' + u.name + '!');
    }

    function buyItem(key) {
        const it = ITEMS[key];
        if (state.coins < it.cost) return;
        if (key === 'magicFertilizer') {
            ensureFertLimits();
            if (state.fertLimits.buyCount >= FERT_DAILY_BUY_LIMIT) {
                showToast('Đã mua hết lượt phân bón hôm nay!');
                return;
            }
            state.fertLimits.buyCount += 1;
        }
        state.coins -= it.cost;
        state.inventory[key] = (state.inventory[key] || 0) + 1;
        save(); render(); switchShopTab('items');
        showToast('Đã mua ' + it.name + '!');
    }

    function buyDecor(key) {
        const d = DECOR[key];
        if (state.decor[key] || state.coins < d.cost) return;
        state.coins -= d.cost;
        state.decor[key] = true;
        save(); render(); switchShopTab('decor');
        showToast('Đã mua ' + d.name + '!');
    }

    // ===== Modal helpers =====
    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
        if (id === 'shop-modal') {
            document.getElementById('tab-farm').classList.add('active');
            document.getElementById('tab-shop').classList.remove('active');
        }
    }
    document.querySelectorAll('.modal-bg').forEach(m => {
        m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
    });
</script>

</body>
</html>
