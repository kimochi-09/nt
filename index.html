<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>nt</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background: #e8e8e8;
            font-family: 'Nunito', -apple-system, system-ui, sans-serif;
        }

        /* ===== LOGIN ===== */
        #login-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100%; padding: 20px;
            background: #e8e8e8;
            position: relative; overflow: hidden;
        }
        #login-screen::before {
            content: '';
            position: absolute; inset: -200px;
            background:
                repeating-linear-gradient(-35deg,
                    transparent 0px, transparent 55px,
                    rgba(210,30,30,0.13) 55px, rgba(210,30,30,0.13) 95px,
                    transparent 95px, transparent 175px,
                    rgba(210,30,30,0.09) 175px, rgba(210,30,30,0.09) 210px,
                    transparent 210px, transparent 310px
                );
            pointer-events: none;
        }
        .login-box {
            background: white; padding: 36px 30px 30px;
            border-radius: 22px; width: 100%; max-width: 330px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            position: relative; z-index: 1;
        }
        .login-logo { font-size: 32px; font-weight: 800; color: #d42020; letter-spacing: -1px; margin-bottom: 6px; }
        .login-sub { font-size: 13px; color: #bbb; margin-bottom: 22px; }
        .login-box input {
            width: 100%; padding: 12px 16px; margin: 6px 0;
            border: 1.5px solid #eee; border-radius: 12px;
            font-size: 15px; font-family: inherit; outline: none;
            transition: border-color .2s; background: #fff;
        }
        .login-box input:focus { border-color: #d42020; }
        .login-btn {
            width: 100%; padding: 14px; margin-top: 12px;
            background: #d42020; color: white; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 800;
            font-family: inherit; cursor: pointer;
            transition: opacity .15s, transform .1s;
        }
        .login-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* ===== LAYOUT ===== */
        #chat-screen { display: none; height: 100%; width: 100%; overflow: hidden; flex-direction: row; }

        /* ===== SIDEBAR — Messenger style ===== */
        .sidebar {
            width: 360px; height: 100%;
            border-right: 1px solid #e4e4e4;
            display: flex; flex-direction: column;
            background: #fff; flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px 16px 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-title { font-size: 24px; font-weight: 800; color: #050505; flex: 1; }
        #my-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            object-fit: cover; cursor: pointer;
            border: 2px solid #d42020;
        }
        .exit-btn {
            border: none; background: #f0f2f5; color: #555;
            font-size: 12px; font-family: inherit; cursor: pointer;
            padding: 5px 10px; border-radius: 20px; font-weight: 600;
        }
        /* Search bar */
        .sidebar-search {
            padding: 6px 14px 10px;
        }
        .sidebar-search input {
            width: 100%; padding: 8px 16px; border: none;
            border-radius: 20px; font-size: 15px;
            font-family: inherit; outline: none;
            background: #f0f2f5; color: #050505;
        }
        /* Add friend */
        .sidebar-add {
            padding: 6px 14px 10px;
            display: flex; gap: 7px; border-bottom: 1px solid #f0f0f0;
        }
        .sidebar-add input {
            flex: 1; padding: 8px 12px; border: 1.5px solid #eee;
            border-radius: 20px; font-size: 13px;
            font-family: inherit; outline: none; background: #f0f2f5;
        }
        .sidebar-add input:focus { border-color: #d42020; }
        .sidebar-add button {
            padding: 8px 12px; background: #d42020; color: white;
            border: none; border-radius: 20px; font-size: 12px;
            font-weight: 700; font-family: inherit; cursor: pointer;
        }
        /* User list */
        #user-list { flex: 1; overflow-y: auto; }
        .user-item {
            padding: 8px 14px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: background .1s;
            border-radius: 10px; margin: 2px 6px;
        }
        .user-item:hover, .user-item.active { background: #f0f2f5; }
        .friend-list-avt {
            width: 56px; height: 56px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0; position: relative;
        }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name { font-size: 15px; font-weight: 700; color: #050505; }
        .friend-preview {
            font-size: 13px; color: #65676b; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
        }
        .friend-time { font-size: 12px; color: #65676b; flex-shrink: 0; margin-left: 4px; }

        /* Online dot */
        .avt-wrap { position: relative; flex-shrink: 0; width: 56px; height: 56px; }
        .avt-wrap .friend-list-avt { width: 100%; height: 100%; }
        .online-dot {
            display: none;
            position: absolute; bottom: 2px; right: 2px;
            width: 13px; height: 13px; border-radius: 50%;
            background: #31a24c; border: 2.5px solid #fff;
        }
        .online-dot.visible { display: block; }

        /* Unread badge */
        .friend-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .unread-badge {
            display: none;
            background: #d42020; color: white;
            font-size: 11px; font-weight: 800;
            border-radius: 20px; min-width: 20px; height: 20px;
            padding: 0 5px; text-align: center; line-height: 20px;
        }
        .unread-badge.visible { display: block; }
        .friend-name.unread-name { color: #050505; font-weight: 800; }
        .friend-preview.unread-preview { color: #050505; font-weight: 700; }

        /* ===== CHAT MAIN ===== */
        .chat-main {
            flex: 1; height: 100%; display: flex;
            flex-direction: column; min-width: 0; background: #fff;
        }
        .chat-header {
            padding: 12px 16px; background: white;
            border-bottom: 1px solid #eee;
            display: flex; align-items: center;
            justify-content: space-between; z-index: 10;
        }
        .chat-header-left { display: flex; align-items: center; gap: 10px; }
        .back-btn {
            border: none; background: none; color: #050505;
            font-size: 22px; padding: 4px 6px; cursor: pointer;
            display: none; border-radius: 50%;
        }
        .back-btn:hover { background: #f0f2f5; }
        #header-avt { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: none; }
        .header-info { display: flex; flex-direction: column; }
        #chat-title { font-size: 15px; font-weight: 700; color: #050505; }
        #chat-status { font-size: 12px; color: #65676b; }
        .chat-header-actions { display: flex; gap: 4px; }
        .header-action-btn {
            border: none; background: none; font-size: 18px; cursor: pointer;
            padding: 8px; border-radius: 50%; color: #0084ff;
            transition: background .1s;
        }
        .header-action-btn:hover { background: #f0f2f5; }
        .settings-btn {
            border: none; background: none; font-size: 18px; cursor: pointer;
            padding: 8px; border-radius: 50%; color: #0084ff;
            transition: background .1s;
        }
        .settings-btn:hover { background: #f0f2f5; }

        /* ===== MESSAGES — clean white background ===== */
        #messages {
            flex: 1; overflow-y: auto;
            padding: 12px 16px 8px;
            display: flex; flex-direction: column;
            gap: 4px;
            background: #fff;
        }

        /* Time divider */
        .time-divider {
            text-align: center; font-size: 12px;
            color: #65676b; margin: 10px 0 6px;
        }

        /* BUBBLES */
        .msg-row { display: flex; gap: 6px; align-items: flex-start; max-width: 75%; }
        .msg-row.me { align-self: flex-end; }
        .msg-row.them { align-self: flex-start; }
        .chat-avt {
            width: 28px; height: 28px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0;
        }
        .msg-col { display: flex; flex-direction: column; max-width: 100%; }
        .msg-bubble {
            padding: 9px 14px; border-radius: 20px;
            font-size: 15px; font-weight: 500;
            word-wrap: break-word; line-height: 1.4;
            display: inline-block; max-width: 100%;
        }
        .them .msg-bubble {
            background: #f0f2f5;
            color: #050505;
            border-radius: 20px;
        }
        .me .msg-bubble {
            background: #0084ff;
            color: white;
            border-radius: 20px;
        }
        /* Group consecutive bubbles - fully rounded */
        .msg-row.me.first .msg-bubble { border-radius: 20px; }
        .msg-row.me.mid .msg-bubble { border-radius: 20px; }
        .msg-row.me.last .msg-bubble { border-radius: 20px; }
        .msg-row.them.first .msg-bubble { border-radius: 20px; }
        .msg-row.them.mid .msg-bubble { border-radius: 20px; }
        .msg-time { font-size: 11px; margin-top: 3px; color: #65676b; }
        .me .msg-time { text-align: right; }
        .them .msg-time { text-align: left; }
        /* Hide avatar on consecutive messages */
        .msg-row.not-last .chat-avt { visibility: hidden; }

        /* ===== INPUT AREA ===== */
        .input-area {
            padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid #e4e4e4;
            display: flex; gap: 8px; align-items: center;
            background: white; flex-shrink: 0;
        }
        .input-action-btn {
            border: none; background: none; color: #0084ff;
            font-size: 22px; cursor: pointer; padding: 4px;
            border-radius: 50%; flex-shrink: 0;
            transition: background .1s;
        }
        .input-action-btn:hover { background: #f0f2f5; }
        #msg-input {
            flex: 1; padding: 9px 14px; border: none;
            border-radius: 22px; background: #f0f2f5;
            outline: none; font-size: 15px; font-family: inherit;
            color: #050505;
        }
        #send-icon {
            border: none; background: none; color: #0084ff;
            font-size: 24px; cursor: pointer; padding: 0 2px;
            transition: transform .1s; flex-shrink: 0;
        }
        #send-icon:active { transform: scale(0.85); }

        /* Emoji button & picker */
        .emoji-wrapper { position: relative; flex-shrink: 0; }
        #emoji-btn {
            border: none; background: none; color: #0084ff;
            font-size: 22px; cursor: pointer; padding: 4px;
            border-radius: 50%; transition: background .1s;
            display: flex; align-items: center; justify-content: center;
        }
        #emoji-btn:hover { background: #f0f2f5; }
        #emoji-picker {
            display: none;
            position: absolute; bottom: 46px; right: 0;
            background: white; border: 1px solid #e4e4e4;
            border-radius: 16px; padding: 10px 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 50; width: 260px;
        }
        #emoji-picker.open { display: block; }
        .emoji-grid {
            display: grid; grid-template-columns: repeat(8, 1fr);
            gap: 2px;
        }
        .emoji-grid span {
            font-size: 22px; cursor: pointer; text-align: center;
            padding: 4px 2px; border-radius: 8px;
            transition: background .1s; line-height: 1.4;
        }
        .emoji-grid span:hover { background: #f0f2f5; }

        /* Empty state */
        .empty-chat {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #bbb; font-size: 15px; gap: 10px;
        }
        .empty-icon { font-size: 48px; opacity: 0.4; }

        /* ===== SETTINGS MODAL ===== */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.45);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 22px;
            border-radius: 18px; width: 90%; max-width: 300px;
        }
        .modal-content h3 {
            margin: 0 0 14px; font-size: 17px; font-weight: 800;
            border-bottom: 1px solid #f0f0f0; padding-bottom: 10px;
        }
        .setting-item { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0; }
        .setting-label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 13px; color: #555; }
        .color-presets { display: flex; gap: 10px; flex-wrap: wrap; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            border: 2px solid white; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.12);
            transition: transform .15s;
        }
        .color-dot:hover { transform: scale(1.18); }
        .delete-friend-btn {
            width: 100%; padding: 10px; border-radius: 10px;
            border: 1.5px solid #d42020; background: white;
            color: #d42020; font-weight: 700; font-size: 14px;
            font-family: inherit; cursor: pointer;
        }
        .modal-done-btn {
            width: 100%; padding: 11px; border-radius: 10px;
            border: none; background: #d42020; color: white;
            font-weight: 800; font-size: 15px;
            font-family: inherit; cursor: pointer; margin-top: 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .sidebar { width: 100%; }
            .chat-main { display: none; width: 100%; }
            #chat-screen.in-chat .sidebar { display: none; }
            #chat-screen.in-chat .chat-main { display: flex; }
            .back-btn { display: block !important; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">nt</div>
        <div class="login-sub">Đăng nhập để nhắn tin</div>
        <input type="text" id="username" placeholder="Tên đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button class="login-btn" onclick="startApp()">Đăng nhập</button>
    </div>
</div>

<div id="chat-screen">
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title" id="sidebar-title">Đoạn chat</span>
            <img id="my-avatar" src="https://via.placeholder.com/36" onclick="document.getElementById('fileInput').click()" title="Đổi ảnh đại diện">
            <input type="file" id="fileInput" style="display:none;" accept="image/*" onchange="uploadImage(this)">
            <button class="exit-btn" onclick="location.reload()">Thoát</button>
        </div>
        <div class="sidebar-search">
            <input type="text" placeholder="🔍  Tìm kiếm trên Messenger">
        </div>
        <div class="sidebar-add">
            <input type="text" id="friend-name" placeholder="Nhập tên người dùng...">
            <button onclick="addFriend()">+ Kết bạn</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <div class="chat-header-left">
                <button class="back-btn" onclick="goBack()">←</button>
                <img id="header-avt" src="">
                <div class="header-info">
                    <span id="chat-title">Chọn người để chat</span>
                    <span id="chat-status"></span>
                </div>
            </div>
            <div class="chat-header-actions">
                <button class="header-action-btn" title="Gọi điện">📞</button>
                <button class="header-action-btn" title="Gọi video">📹</button>
                <button id="header-settings-btn" class="settings-btn" style="display:none;" onclick="toggleModal(true)" title="Thông tin">⋯</button>
            </div>
        </div>
        <div id="messages">
            <div class="empty-chat" id="empty-state">
                <div class="empty-icon">💬</div>
                <div>Chọn một đoạn chat để bắt đầu</div>
            </div>
        </div>
        <div class="input-area">
            <button class="input-action-btn" title="Ảnh" onclick="document.getElementById('chat-img-input').click()">🖼️</button>
            <input type="file" id="chat-img-input" accept="image/*" style="display:none;" onchange="sendImage(this)">

            <input type="text" id="msg-input" placeholder="Aa" onkeypress="if(event.key==='Enter') sendMsg()">
            <div class="emoji-wrapper">
                <button id="emoji-btn" title="Biểu tượng cảm xúc" onclick="toggleEmojiPicker(event)">🙂</button>
                <div id="emoji-picker">
                    <div class="emoji-grid" id="emoji-grid"></div>
                </div>
            </div>
            <button onclick="sendMsg()" id="send-icon">👍</button>
        </div>
    </div>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3>Tùy chỉnh</h3>
        <div class="setting-item">
            <label class="setting-label">Màu tin nhắn</label>
            <div class="color-presets">
                <div class="color-dot" style="background:#0084ff" onclick="changeThemeColor('#0084ff')"></div>
                <div class="color-dot" style="background:#d42020" onclick="changeThemeColor('#d42020')"></div>
                <div class="color-dot" style="background:#111111" onclick="changeThemeColor('#111111')"></div>
                <div class="color-dot" style="background:#4caf50" onclick="changeThemeColor('#4caf50')"></div>
                <div class="color-dot" style="background:#9c27b0" onclick="changeThemeColor('#9c27b0')"></div>
                <div class="color-dot" style="background:#ff9800" onclick="changeThemeColor('#ff9800')"></div>
            </div>
        </div>
        <div class="setting-item">
            <label class="setting-label">Ảnh nền khung chat</label>
            <input type="file" accept="image/*" onchange="uploadBackground(this)" style="font-size:12px; width:100%;">
            <button onclick="removeBackground()" style="margin-top:8px; color:#888; border:none; background:none; cursor:pointer; font-size:13px; font-family:inherit;">✕ Xóa ảnh nền</button>
        </div>
        <div class="setting-item" style="border-bottom:none; margin-bottom:12px;">
            <button onclick="deleteFriend()" class="delete-friend-btn">🗑️ Hủy kết bạn</button>
        </div>
        <button onclick="toggleModal(false)" class="modal-done-btn">Xong</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDH_skpX3D9sD3zz3iiyrHnB28BIVvIMM0",
        authDomain: "hihi-c6af6.firebaseapp.com",
        databaseURL: "https://hihi-c6af6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hihi-c6af6",
        storageBucket: "hihi-c6af6.firebasestorage.app",
        messagingSenderId: "164013580789",
        appId: "1:164013580789:web:94227e94c6d517170f40bc",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let myId = "", toId = "", currentRoom = "", avatars = {}, themeColor = "#111111";
    let msgRef = null, settingsRef = null;

    async function startApp() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        if(!user || pass.length < 6) return alert("Nhập đủ thông tin!");
        myId = user;
        const email = myId.toLowerCase().replace(/\s/g, '') + "@chat.vn";
        try {
            await auth.signInWithEmailAndPassword(email, pass).catch(() => auth.createUserWithEmailAndPassword(email, pass));
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('sidebar-title').textContent = myId;
            db.ref('user_profiles/' + myId).on('value', s => {
                if(s.exists() && s.val().avatar) {
                    document.getElementById('my-avatar').src = s.val().avatar;
                    avatars[myId] = s.val().avatar;
                }
            });
            loadFriends();
        } catch(e) { alert(e.message); }
    }

    // Track online presence for myself
    function setOnline() {
        const ref = db.ref('presence/' + myId);
        ref.set(true);
        ref.onDisconnect().remove();
    }

    function loadFriends() {
        setOnline();
        db.ref('friends/' + myId).on('value', s => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            if(!s.exists()) return;
            s.forEach(child => {
                const name = child.key;
                db.ref('user_profiles/' + name).once('value', p => {
                    const avt = p.exists() && p.val().avatar ? p.val().avatar : 'https://via.placeholder.com/56';
                    avatars[name] = avt;

                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.id = 'friend-item-' + name;

                    // Avatar wrapper with online dot
                    const avtWrap = document.createElement('div');
                    avtWrap.className = 'avt-wrap';

                    const img = document.createElement('img');
                    img.src = avt; img.className = 'friend-list-avt';

                    const onlineDot = document.createElement('div');
                    onlineDot.className = 'online-dot';
                    onlineDot.id = 'dot-' + name;

                    avtWrap.appendChild(img);
                    avtWrap.appendChild(onlineDot);

                    const info = document.createElement('div');
                    info.className = 'friend-info';

                    const nameEl = document.createElement('div');
                    nameEl.className = 'friend-name';
                    nameEl.id = 'fname-' + name;
                    nameEl.textContent = name;

                    const preview = document.createElement('div');
                    preview.className = 'friend-preview';
                    preview.id = 'preview-' + name;
                    preview.textContent = 'Nhấn để nhắn tin';

                    info.appendChild(nameEl);
                    info.appendChild(preview);

                    // Meta: time + unread badge
                    const meta = document.createElement('div');
                    meta.className = 'friend-meta';

                    const timeEl = document.createElement('div');
                    timeEl.className = 'friend-time';
                    timeEl.id = 'time-' + name;

                    const badge = document.createElement('div');
                    badge.className = 'unread-badge';
                    badge.id = 'badge-' + name;

                    meta.appendChild(timeEl);
                    meta.appendChild(badge);

                    div.appendChild(avtWrap);
                    div.appendChild(info);
                    div.appendChild(meta);
                    div.onclick = () => openChat(name, avt, div);
                    list.appendChild(div);

                    // Listen for online presence
                    db.ref('presence/' + name).on('value', snap => {
                        const dot = document.getElementById('dot-' + name);
                        if(dot) dot.classList.toggle('visible', !!snap.val());
                    });

                    // Listen for last message preview + unread count (real-time via Firebase)
                    const room = myId < name ? myId + name : name + myId;
                    let _chatSnap = null, _lastRead = 0;

                    function _refreshBadge() {
                        if(!_chatSnap || !_chatSnap.exists()) return;
                        let lastMsg = null, unread = 0;
                        _chatSnap.forEach(msg => {
                            const d = msg.val();
                            lastMsg = d;
                            if(d.s !== myId && (d.ts || 0) > _lastRead) unread++;
                        });
                        if(lastMsg) {
                            const pre = document.getElementById('preview-' + name);
                            const tEl = document.getElementById('time-' + name);
                            if(pre) pre.textContent = (lastMsg.s === myId ? 'Bạn: ' : '') + (lastMsg.img ? '🖼️ Ảnh' : lastMsg.t);
                            if(tEl) tEl.textContent = lastMsg.time || '';
                        }
                        const badgeEl = document.getElementById('badge-' + name);
                        const nameLabel = document.getElementById('fname-' + name);
                        const preEl = document.getElementById('preview-' + name);
                        if(badgeEl) {
                            const show = unread > 0 && toId !== name;
                            badgeEl.textContent = unread > 99 ? '99+' : unread;
                            badgeEl.classList.toggle('visible', show);
                            if(nameLabel) nameLabel.classList.toggle('unread-name', show);
                            if(preEl) preEl.classList.toggle('unread-preview', show);
                        }
                    }

                    db.ref('chats/' + room).on('value', snap => {
                        _chatSnap = snap;
                        _refreshBadge();
                    });

                    db.ref('read_receipts/' + room + '/' + myId).on('value', snap => {
                        _lastRead = snap.val() || 0;
                        _refreshBadge();
                    });
                });
            });
        });
    }

    // Mark messages as read — writes timestamp to Firebase so all listeners update
    function markAsRead(name) {
        const room = myId < name ? myId + name : name + myId;
        db.ref('read_receipts/' + room + '/' + myId).set(Date.now());
    }

    function openChat(name, avt, div) {
        toId = name;
        // Mark active
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        if(div) div.classList.add('active');

        document.getElementById('chat-title').innerText = toId;
        document.getElementById('chat-status').innerText = '';
        const ha = document.getElementById('header-avt');
        ha.src = avt; ha.style.display = 'block';
        document.getElementById('header-settings-btn').style.display = 'block';
        document.getElementById('empty-state') && (document.getElementById('empty-state').style.display = 'none');
        document.getElementById('chat-screen').classList.add('in-chat');

        // Update send button to arrow
        document.getElementById('send-icon').textContent = '➤';
        document.getElementById('send-icon').style.fontSize = '22px';

        markAsRead(name);
        loadMessages();
        listenSettings();
    }

    function listenSettings() {
        if(!toId) return;
        const room = myId < toId ? myId + toId : toId + myId;
        if(settingsRef) settingsRef.off();
        settingsRef = db.ref('room_settings/' + room);
        settingsRef.on('value', s => {
            const set = s.val() || {};
            themeColor = set.color || "#0084ff";
            document.getElementById('send-icon').style.color = themeColor;
            const box = document.getElementById('messages');
            if(set.background) {
                box.style.backgroundImage = `url(${set.background})`;
                box.style.backgroundSize = 'cover';
                box.style.backgroundPosition = 'center';
            } else {
                box.style.backgroundImage = '';
            }
            document.querySelectorAll('.me .msg-bubble').forEach(el => el.style.background = themeColor);
        });
    }

    function loadMessages() {
        const room = myId < toId ? myId + toId : toId + myId;
        if(currentRoom === room) return;
        currentRoom = room;
        const box = document.getElementById('messages');
        box.innerHTML = "";
        if(msgRef) msgRef.off();
        msgRef = db.ref('chats/' + room);
        msgRef.limitToLast(50).on('child_added', s => renderMsg(s.val(), box));
    }

    function renderMsg(d, box) {
        const isMe = d.s === myId;
        const avt = avatars[d.s] || 'https://via.placeholder.com/28';

        // Remove empty state
        const es = document.getElementById('empty-state');
        if(es) es.remove();

        const row = document.createElement('div');
        row.className = `msg-row ${isMe ? 'me' : 'them'}`;

        const avtImg = document.createElement('img');
        avtImg.src = avt; avtImg.className = 'chat-avt';

        const col = document.createElement('div');
        col.className = 'msg-col';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        if(d.img) {
            const imgEl = document.createElement('img');
            imgEl.src = d.img;
            imgEl.style.cssText = 'max-width:220px; max-height:260px; border-radius:14px; display:block;';
            bubble.style.padding = '4px';
            bubble.style.background = 'transparent';
            if(isMe) bubble.style.background = 'transparent';
            bubble.appendChild(imgEl);
        } else {
            bubble.textContent = d.t;
            if(isMe) { bubble.style.background = themeColor; bubble.style.color = 'white'; }
        }

        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = d.time || '';

        col.appendChild(bubble); col.appendChild(time);
        if(!isMe) {
            row.appendChild(avtImg);
            row.appendChild(col);
        } else {
            row.appendChild(col);
            row.appendChild(avtImg);
        }
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    }

    function deleteFriend() {
        if(!toId) return;
        if(confirm(`Bạn có chắc muốn xóa kết bạn với ${toId}?`)) {
            db.ref('friends/' + myId + '/' + toId).remove();
            db.ref('friends/' + toId + '/' + myId).remove();
            toggleModal(false); goBack();
            toId = "";
            document.getElementById('chat-title').innerText = "Chọn người để chat";
            document.getElementById('chat-status').innerText = '';
            document.getElementById('header-settings-btn').style.display = 'none';
            document.getElementById('header-avt').style.display = 'none';
        }
    }

    function sendImage(input) {
        if(!input.files || !input.files[0] || !toId) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const room = myId < toId ? myId + toId : toId + myId;
            db.ref('chats/' + room).push({
                s: myId,
                t: '',
                img: e.target.result,
                ts: Date.now(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        };
        reader.readAsDataURL(input.files[0]);
        input.value = '';
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const t = input.value.trim();
        if(!t || !toId) return;
        const room = myId < toId ? myId + toId : toId + myId;
        db.ref('chats/' + room).push({ s: myId, t: t, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), ts: Date.now() });
        input.value = "";
    }

    function changeThemeColor(c) {
        if(!toId) return;
        const room = myId < toId ? myId + toId : toId + myId;
        db.ref('room_settings/' + room).update({ color: c });
    }

    function uploadBackground(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const room = myId < toId ? myId + toId : toId + myId;
                db.ref('room_settings/' + room).update({ background: e.target.result });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function removeBackground() {
        if(!toId) return;
        const room = myId < toId ? myId + toId : toId + myId;
        db.ref('room_settings/' + room).update({ background: null });
    }

    // ===== EMOJI PICKER =====
    const EMOJIS = [
        '😀','😁','😂','🤣','😃','😄','😅','😆',
        '😉','😊','😋','😎','😍','🥰','😘','😗',
        '😙','🥲','😚','🙂','🤗','🤩','🤔','🤭',
        '😐','😑','😶','🙄','😏','😒','😬','🤥',
        '😌','😔','😪','🤤','😴','😷','🤒','🤕',
        '🤑','🤠','😈','👿','💀','💩','🤡','👻',
        '😺','😸','😹','😻','😼','😽','🙀','😿',
        '❤️','🧡','💛','💚','💙','💜','🖤','🤍',
        '👍','👎','👏','🙌','🤝','🤜','🤛','✊',
        '👋','🤚','🖐️','✋','🖖','🤙','💪','🙏',
        '😻','🎉','🔥','⭐','✨','💥','❄️','🌈',
        '🍕','🍔','🍟','🌮','🍣','🍜','🍩','☕'
    ];

    function initEmojiPicker() {
        const grid = document.getElementById('emoji-grid');
        EMOJIS.forEach(e => {
            const span = document.createElement('span');
            span.textContent = e;
            span.onclick = () => insertEmoji(e);
            grid.appendChild(span);
        });
    }

    function insertEmoji(emoji) {
        const input = document.getElementById('msg-input');
        const start = input.selectionStart;
        const end = input.selectionEnd;
        input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
        input.selectionStart = input.selectionEnd = start + emoji.length;
        input.focus();
    }

    function toggleEmojiPicker(e) {
        e.stopPropagation();
        document.getElementById('emoji-picker').classList.toggle('open');
    }

    document.addEventListener('click', () => {
        document.getElementById('emoji-picker') && document.getElementById('emoji-picker').classList.remove('open');
    });

    document.getElementById('emoji-picker').addEventListener('click', e => e.stopPropagation());

    initEmojiPicker();

    function toggleModal(s) { document.getElementById('settings-modal').style.display = s ? 'flex' : 'none'; }
    function goBack() { document.getElementById('chat-screen').classList.remove('in-chat'); }

    function addFriend() {
        const name = document.getElementById('friend-name').value.trim();
        if(name && name !== myId) {
            db.ref('friends/' + myId + '/' + name).set(true);
            db.ref('friends/' + name + '/' + myId).set(true);
            document.getElementById('friend-name').value = '';
        }
    }

    function uploadImage(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => db.ref('user_profiles/' + myId).update({ avatar: e.target.result });
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
