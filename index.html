<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đồng hồ thời gian thực</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');

    :root {
        --bg: #0a0e14;
        --panel: #10151f;
        --line: #1e2733;
        --text: #e6edf5;
        --dim: #5c6b7a;
        --pulse: #3ddc97;
    }
    * { box-sizing: border-box; }
    html, body {
        height: 100%; margin: 0;
        background: var(--bg);
        font-family: 'Inter', sans-serif;
        display: flex; align-items: center; justify-content: center;
        color: var(--text);
        overflow: hidden;
        position: fixed;
        inset: 0;
        width: 100%;
        overscroll-behavior: none;
    }
    .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 48px 56px;
        text-align: center;
        background: linear-gradient(180deg, var(--panel), #0c1119);
        box-shadow: 0 0 60px rgba(61,220,151,0.05);
    }
    .date {
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 18px;
    }
    .clock {
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: clamp(48px, 9vw, 96px);
        letter-spacing: 0.03em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
    }
    .clock .ms {
        font-size: 0.35em;
        color: var(--dim);
        margin-left: 8px;
    }
    .status {
        margin-top: 22px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--pulse);
        letter-spacing: 0.05em;
    }
    .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--pulse);
        animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,220,151,0.5); }
        50% { opacity: 0.4; box-shadow: 0 0 0 6px rgba(61,220,151,0); }
    }
</style>
</head>
<body>

    <div class="panel">
        <div class="date" id="date">--</div>
        <div class="clock"><span id="time">00:00:00</span><span class="ms" id="ms">.000</span></div>
        <div class="status"><span class="dot"></span> Đang cập nhật</div>
    </div>

<script>
    const dateEl = document.getElementById('date');
    const timeEl = document.getElementById('time');
    const msEl = document.getElementById('ms');
    const pad = (n, len = 2) => String(n).padStart(len, '0');
    const dayNames = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];

    function tick() {
        const now = new Date();
        dateEl.textContent = `${dayNames[now.getDay()]}, ${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
        timeEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        msEl.textContent = `.${pad(now.getMilliseconds(), 3)}`;
        requestAnimationFrame(tick);
    }
    tick();
</script>
</body>
</html>
